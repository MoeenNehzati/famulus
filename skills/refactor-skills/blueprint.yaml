category: skill-making-development-assistant
role: meta-skill
kind: maintenance
suggested_permissions:
  bash: []
  network: []
skill_interface:
  inputs:
  - User requests that match the SKILL.md description for this skill.
  outputs:
  - Responses, artifacts, or side effects described by this skill's workflow.
  side_effects:
  - May invoke local scripts or dependencies as described in SKILL.md.
interfaces:
  machine: {}
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
      behavior_sources:
      - path: $repo/references/skill-standards/skill-guidelines.md
        content: skill
        format: markdown
        reason: "Defines repository skill-module standards used during refactoring."
      - path: $repo/references/skill-standards/llm-interface-design.md
        content: skill
        format: markdown
        reason: "Defines when and how to decompose LLM-facing skill interfaces."
      - path: $repo/references/skill-standards/skill-smells.md
        content: skill
        format: markdown
        reason: "Defines the diagnostic signals checked during skill refactoring."
      - path: $repo/references/skill-standards/skill-refactoring-catalog.md
        content: skill
        format: markdown
        reason: "Defines the behavior-preserving moves used to address diagnosed skill smells."
