category: system-assistant
role: document-processing
kind: converter
cross_platform: false
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_source_fetcher.py:Interface
    reason: Suggested approval for the PDF conversion runtime.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_marker_probe.py:Interface
    reason: Suggested approval for the PDF conversion runtime.
  - command:
    - marker_single
    reason: Suggested approval for the PDF conversion runtime.
  network:
  - kind: web_search
    reason: Suggested approval for the PDF conversion runtime.
  - kind: web_fetch
    domains:
    - arxiv.org
    reason: Suggested approval for the PDF conversion runtime.
skill_interface:
  inputs:
  - User requests that match the SKILL.md description for this skill.
  outputs:
  - Responses, artifacts, or side effects described by this skill's workflow.
  side_effects:
  - May invoke local scripts or dependencies as described in SKILL.md.
interfaces:
  machine:
    scripts-check-marker-models:
      version: 1
      description: Check whether required Marker/Surya models are downloaded and cached
        locally.
      usage: ''
      patterns:
      - name: owner
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_marker_probe.py:Interface
      dependencies:
      - kind: python
        name: marker-pdf
        reason: Provides the Surya settings module used to locate Marker model checkpoints.
      directly_reads: []
      directly_executes:
      - _rtx/_marker_probe.py
      directly_writes: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
    scripts-fetch-arxiv-source:
      version: 1
      description: Download and extract the LaTeX source tarball for a paper from
        arXiv.
      usage: <arxiv-id> <output-dir>
      patterns:
      - name: owner
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_source_fetcher.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_source_fetcher.py
      directly_writes: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
      - SKILL.md
      directly_executes: []
      directly_writes: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
