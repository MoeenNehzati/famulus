# Canonical contract for pdf-to-markdown.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder machine interfaces as each runtime contract becomes clearer.

category: system-assistant
# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

cross_platform: false

depends_on: {}

suggested_permissions:
  bash:
    - command: ["_rtx/_source_fetcher.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["_rtx/_marker_probe.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["marker_single"]
      reason: "Migrated from legacy permissions.json."
  network:
    - kind: web_search
      reason: "Migrated from legacy permissions.json."
    - kind: web_fetch
      domains: ["arxiv.org"]
      reason: "Migrated from legacy permissions.json."

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

interfaces:
  machine:
    scripts-check-marker-models:
      description: Check whether required Marker/Surya models are downloaded and cached
        locally.
      usage: ''
      patterns:
        - name: owner
      runtime:
        kind: command
        argv:
          - _rtx/_marker_probe.sh
      dependencies:
        - kind: python
          name: marker-pdf
          reason: Provides the Surya settings module used to locate Marker model checkpoints.
      directly_reads: []
      directly_executes:
        - _rtx/_marker_probe.sh
      directly_writes: []
    scripts-fetch-arxiv-source:
      description: Download and extract the LaTeX source tarball for a paper from
        arXiv.
      usage: <arxiv-id> <output-dir>
      patterns:
        - name: owner
      runtime:
        kind: command
        argv:
          - _rtx/_source_fetcher.sh
      dependencies:
        - kind: binary
          name: curl
          reason: Downloads arXiv source tarballs.
        - kind: binary
          name: file
          reason: Detects arXiv HTML responses versus gzip source archives.
        - kind: binary
          name: tar
          reason: Extracts downloaded source archives.
      directly_reads: []
      directly_executes:
        - _rtx/_source_fetcher.sh
      directly_writes: []
  llm:
    default:
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
        - SKILL.md
      directly_executes: []
      directly_writes: []
