category: system-assistant
role: document-processing
kind: converter
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_source_fetcher.py:Interface
    reason: Suggested approval for the PDF conversion runtime.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_marker_probe.py:Interface
    reason: Suggested approval for the PDF conversion runtime.
  - command:
    - marker_single
    reason: Suggested approval for the PDF conversion runtime.
  network:
  - kind: web_search
    reason: Suggested approval for the PDF conversion runtime.
  - kind: web_fetch
    domains:
    - arxiv.org
    reason: Suggested approval for the PDF conversion runtime.
skill_interface:
  inputs:
  - User requests that match the SKILL.md description for this skill.
  outputs:
  - Responses, artifacts, or side effects described by this skill's workflow.
  side_effects:
  - May invoke local scripts or dependencies as described in SKILL.md.
interfaces:
  machine:
    scripts-check-marker-models:
      version: 1
      description: Check whether required Marker/Surya models are downloaded and cached
        locally.
      usage: ''
      patterns:
      - name: owner
      dependencies:
      - kind: python-package
        name: marker-pdf
        reason: Provides the Surya settings module used to locate Marker model checkpoints.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      direct_io:
        reads:
        - medium: local-filesystem
          access: read
          system: model-cache
          content: checkpoint
          path: $home/.cache/datalab/models/
          sensitivity: user-private
        writes:
        - medium: stdout
          access: write
          content: diagnostic-report
          format: text
          sensitivity: derived-private
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_marker_probe.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: false
        windows: false
    scripts-fetch-arxiv-source:
      version: 1
      description: Download and extract the LaTeX source tarball for a paper from
        arXiv.
      usage: <arxiv-id> <output-dir>
      patterns:
      - name: owner
      dependencies: []
      direct_io:
        reads: []
        writes:
        - medium: local-filesystem
          access: write
          system: filesystem
          content: source
          format: tex
          path: <output-dir>
          sensitivity: public
        - medium: stdout
          access: write
          content: diagnostic-report
          format: text
          sensitivity: derived-private
        network:
        - medium: network-request
          access: download
          system: arxiv
          content: source
          format: tex
          sensitivity: public
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_source_fetcher.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: false
        windows: false
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      direct_io:
        reads:
        - medium: prompt
          access: read
          content: document
          format: pdf
          sensitivity: user-private
        writes:
        - medium: prompt
          access: write
          content: document
          format: markdown
          sensitivity: derived-private
        network: []
      owns_filesystem: []
      allow_all_skills: true
      behavior_sources: []
