# Canonical contract for pdf-to-markdown.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder script interfaces as each script contract becomes clearer.

category: system-assistant
# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

cross_platform: false

depends_on:
  {}

suggested_permissions:
  bash:
    - command: ["scripts/fetch-arxiv-source.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/check-marker-models.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["marker_single"]
      reason: "Migrated from legacy permissions.json."
  network:
    - kind: web_search
      reason: "Migrated from legacy permissions.json."
    - kind: web_fetch
      domains: ["arxiv.org"]
      reason: "Migrated from legacy permissions.json."

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

script_interfaces:
  scripts-check-marker-models:
    id: scripts-check-marker-models
    description: "Check whether required Marker/Surya models are downloaded and cached locally."
    usage: ""
    cwd: skill_root
    command: ["scripts/check-marker-models.sh"]
    dependencies:
      - kind: python
        name: marker-pdf
        reason: "Provides the Surya settings module used to locate Marker model checkpoints."
    default:
      patterns:
        - name: owner
  scripts-fetch-arxiv-source:
    id: scripts-fetch-arxiv-source
    description: "Download and extract the LaTeX source tarball for a paper from arXiv."
    usage: "<arxiv-id> <output-dir>"
    cwd: skill_root
    command: ["scripts/fetch-arxiv-source.sh"]
    dependencies:
      - kind: binary
        name: curl
        reason: "Downloads arXiv source tarballs."
      - kind: binary
        name: file
        reason: "Detects arXiv HTML responses versus gzip source archives."
      - kind: binary
        name: tar
        reason: "Extracts downloaded source archives."
    default:
      patterns:
        - name: owner
