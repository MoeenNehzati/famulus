# Canonical contract for bib-audit.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder script interfaces as each script contract becomes clearer.

category: document-oriented

# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

depends_on:
  {}

suggested_permissions:
  bash:
    - command: ["biber"]
      reason: "Migrated from legacy permissions.json."
    - command: ["bibtex-check"]
      reason: "Migrated from legacy permissions.json."
    - command: ["bibtex-update"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/bib-similarity.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/bib-validate-bibtex.py"]
      reason: "Migrated from legacy permissions.json."
  network:
    []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

script_interfaces:
  scripts-bib-similarity:
    id: scripts-bib-similarity
    description: "Detect duplicate and version-pair candidates in a .bib file by scoring all entry pairs."
    usage: "<file.bib> [--threshold 0.3]"
    cwd: skill_root
    command: ["python3", "scripts/bib-similarity.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true
  scripts-bib-validate-bibtex:
    id: scripts-bib-validate-bibtex
    description: "Validate a BibTeX/natbib .bib file for syntax errors and missing required fields (not for biblatex projects)."
    usage: "<file.bib>"
    cwd: skill_root
    command: ["python3", "scripts/bib-validate-bibtex.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true
