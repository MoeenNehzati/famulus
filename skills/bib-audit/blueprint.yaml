# Canonical contract for bib-audit.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder machine interfaces as each runtime contract becomes clearer.

category: research-assistant
# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

depends_on: {}

suggested_permissions:
  bash:
    - command: ["biber"]
      reason: "Migrated from legacy permissions.json."
    - command: ["bibtex-check"]
      reason: "Migrated from legacy permissions.json."
    - command: ["bibtex-update"]
      reason: "Migrated from legacy permissions.json."
    - command: ["dispatcher"]
      args_prefix: ["--caller-skill", "bib-audit", "bib-audit.machine.scripts-bib-similarity"]
      reason: "Runs the local bib-audit duplicate/version candidate detector through\
        \ the shared dispatcher runtime."
    - command: ["dispatcher"]
      args_prefix: ["--caller-skill", "bib-audit", "bib-audit.machine.scripts-bib-validate-bibtex"]
      reason: "Runs the local bib-audit BibTeX/natbib validator through the shared\
        \ dispatcher runtime."
  network: []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

interfaces:
  machine:
    scripts-bib-similarity:
      description: Detect duplicate and version-pair candidates in a .bib file by
        scoring all entry pairs.
      usage: <file.bib> [--threshold 0.3]
      patterns:
        - name: owner
          allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_reference_pairs.py:SimilarityInterface
      dependencies:
        - kind: python
          name: bibtexparser
          reason: Parses BibTeX entries more accurately than the fallback parser.
      directly_reads: []
      directly_executes:
        - _rtx/_reference_pairs.py
      directly_writes: []
    scripts-bib-validate-bibtex:
      description: Validate a BibTeX/natbib .bib file for syntax errors and missing
        required fields (not for biblatex projects).
      usage: <file.bib>
      patterns:
        - name: owner
          allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_syntax_checker.py:ValidateBibtexInterface
      dependencies:
        - kind: python
          name: bibtexparser
          reason: Parses BibTeX entries more accurately than the fallback parser.
      directly_reads: []
      directly_executes:
        - _rtx/_syntax_checker.py
      directly_writes: []
  llm:
    default:
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
        - SKILL.md
      directly_executes: []
      directly_writes: []
