# Canonical contract for prepare-handoff.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder machine interfaces as each runtime contract becomes clearer.

category: workflow-general-assistant
# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

depends_on: {}

suggested_permissions:
  bash: []
  network: []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "A proposed handoff plan, followed after approval by workflow/doc updates, residual\
      \ lessons, or both."
  side_effects:
    - "May update workflow docs, documentation, and dated lesson files after user\
      \ approval."

interfaces:
  machine: {}
  llm:
    default:
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
        - SKILL.md
      directly_executes: []
      directly_writes: []
