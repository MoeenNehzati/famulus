category: workflow-general-assistant
role: automation
kind: generator
suggested_permissions:
  bash: []
  network: []
skill_interface:
  inputs:
  - User requests that match the SKILL.md description for this skill.
  outputs:
  - A proposed handoff plan, followed after approval by workflow/doc updates, residual
    lessons, or both.
  side_effects:
  - May update workflow docs, documentation, and dated lesson files after user approval.
interfaces:
  machine: {}
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
      behavior_sources: []
