category: skill-making-development-assistant
role: meta-skill
kind: generator
cross_platform: true
suggested_permissions:
  bash: []
  network: []
skill_interface:
  inputs:
  - User requests to design, create, install, debug, or refactor cross-host assistant
    hooks.
  - Existing host hook configs, installer code, hook modules, and tests when present.
  outputs:
  - A host-aware hook design, scaffold, patch, or review that separates purpose, lifecycle
    binding, and output adapter.
  side_effects:
  - May create or modify hook modules, host registration code, and tests when the
    user asks for implementation.
interfaces:
  machine: {}
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
      - SKILL.md
      directly_executes: []
      directly_writes: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
