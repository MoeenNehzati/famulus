# Canonical contract for install-assistant-tools.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder script interfaces as each script contract becomes clearer.

category: automation

# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

depends_on:
  cloud-files:
    major_version: 1
    exports:
      - setup-oauth
  g-calendar:
    major_version: 1
    exports:
      - setup-oauth

suggested_permissions:
  bash:
    []
  network:
    []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

script_interfaces:
  scripts-install:
    id: scripts-install
    cwd: skill_root
    command: ["python3", "scripts/install.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/install.py; tighten this contract when needed."
    exported_interface: []
  scripts-setup-symlinks:
    id: scripts-setup-symlinks
    cwd: skill_root
    command: ["python3", "scripts/setup_symlinks.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/setup_symlinks.py; tighten this contract when needed."
    exported_interface: []
  scripts-setup-tools:
    id: scripts-setup-tools
    cwd: skill_root
    command: ["python3", "scripts/setup_tools.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/setup_tools.py; tighten this contract when needed."
    exported_interface: []
