# Canonical contract for install-assistant-tools.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder script interfaces as each script contract becomes clearer.

category: automation

# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

depends_on:
  cloud-files:
    major_version: 1
    exports:
      - setup-oauth
  g-calendar:
    major_version: 1
    exports:
      - setup-oauth

suggested_permissions:
  bash:
    []
  network:
    []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

script_interfaces:
  scripts-install:
    id: scripts-install
    description: "Run the combined installer — wires config dirs to the repo, then installs bin scripts, rc block, and git hooks."
    usage: "[--dry-run] [--no-claude] [--no-codex] [--bin-dir DIR] [--shell-rc FILE] [--system-shell-rc FILE] [--no-system-shell-rc] [--default-llm {claude,codex}] [--cloud-files-remote-llm-root PATH] [--home DIR] [--claude-home DIR] [--codex-home DIR]"
    cwd: skill_root
    command: ["python3", "scripts/install.py"]
    default:
      patterns:
        - name: owner
  scripts-setup-symlinks:
    id: scripts-setup-symlinks
    description: "Wire Claude and Codex config dirs to the canonical AI repo with symlinks, preserving any unique local skill entries."
    usage: "[--dry-run] [--no-claude] [--no-codex] [--home DIR] [--claude-home DIR] [--codex-home DIR]"
    cwd: skill_root
    command: ["python3", "scripts/setup_symlinks.py"]
    default:
      patterns:
        - name: owner
  scripts-setup-tools:
    id: scripts-setup-tools
    description: "Install or update bin launchers, worker dirs, profile symlinks, git hooks, and the managed shell rc block."
    usage: "[--dry-run] [--no-system-shell-rc] [--bin-dir DIR] [--shell-rc FILE] [--system-shell-rc FILE] [--default-llm {claude,codex}] [--cloud-files-remote-llm-root PATH] [--home DIR] [--codex-home DIR] [--claude-home DIR]"
    cwd: skill_root
    command: ["python3", "scripts/setup_tools.py"]
    default:
      patterns:
        - name: owner
