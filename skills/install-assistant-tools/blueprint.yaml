category: skill-making-development-assistant
role: system-operations
kind: installer
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_phase_entry.py:Interface
    reason: Run the phase-1 installer orchestrator through the shared Python machine-interface
      runner.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_install_scaffold.py:Interface
    reason: Install dispatcher and invoke-skill launchers through the shared Python
      machine-interface runner.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_config_bridge.py:Interface
    reason: Wire dev-mode config links and hooks through the shared Python machine-interface
      runner.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_agent_launchers.py:Interface
    reason: Install selected assistant launchers through the shared Python machine-interface
      runner.
  network: []
skill_interface:
  inputs:
  - User requests that match the SKILL.md description for this skill.
  outputs:
  - Responses, artifacts, or side effects described by this skill's workflow.
  side_effects:
  - May invoke local scripts or dependencies as described in SKILL.md.
interfaces:
  machine:
    scripts-install:
      version: 2
      description: 'Phase-1 orchestrator: asks the dev-mode question, then runs scaffold,
        optionally dev-link, then launchers.'
      usage: '[--dry-run] [--non-interactive] [--dev-mode|--no-dev-mode] [--repo-path
        DIR] [--agents LIST] [--default-llm {claude,codex}] [--home DIR] [--bin-dir
        DIR] [--shell-rc FILE] [--codex-home DIR] [--claude-home DIR]'
      patterns:
      - name: owner
      dependencies:
      - kind: binary
        name: git
        reason: Configures repository hook settings during development installs.
        version: any
        platforms:
          linux: true
          macos: true
          windows: true
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_phase_entry.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-scaffold:
      version: 2
      description: Install the dispatcher + invoke-skill launchers and put the bin
        dir on PATH. Universal floor, mode-independent.
      usage: --repo-root DIR [--home DIR] [--bin-dir DIR] [--shell-rc FILE] [--dry-run]
      patterns:
      - name: owner
      dependencies: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_install_scaffold.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-dev-link:
      version: 2
      description: Symlink Claude/Codex config dirs to a live repo checkout, register
        dev-mode hooks, set git hooksPath, export $AI. Requires an explicit repo path.
      usage: --repo-root DIR [--no-claude] [--no-codex] [--home DIR] [--claude-home
        DIR] [--codex-home DIR] [--shell-rc FILE] [--dry-run]
      patterns:
      - name: owner
      dependencies:
      - kind: binary
        name: git
        reason: Configures repository hook settings during development installs.
        version: any
        platforms:
          linux: true
          macos: true
          windows: true
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_config_bridge.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-launchers:
      version: 2
      description: Install per-agent bin launcher, profile config, worker dir, and
        ASSISTANT_DEFAULT for the given agents.
      usage: --repo-root DIR --agents LIST [--home DIR] [--bin-dir DIR] [--codex-home
        DIR] [--claude-home DIR] [--shell-rc FILE] [--default-llm {claude,codex}]
        [--dry-run]
      patterns:
      - name: owner
      dependencies: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_agent_launchers.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
  llm:
    default:
      version: 2
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
      behavior_sources: []
