schema_version: 2
blueprint_type: skill
id: skill-drift
category: skill-making-development-assistant
role: meta-skill
kind: diagnostic
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_check_drift_state.py:Interface
    reason: Read-only skill audit status checks.
  network: []
skill_interface:
  inputs:
  - User request to read or check skill audit state.
  - User or skill request to compute current audit hashes.
  - Optional target skill names.
  outputs:
  - Drift reports comparing recorded health with current recursive graph health for typed skills.
  - Current audit hash payloads for installed blueprint-backed skills.
  side_effects:
  - Writes timestamped Markdown reports under _build/.
  - Does not write audit or health records.
interfaces:
- interface: skill-drift.llm.default
  version: 1
  blueprint:
    base: skill-root
    path: .SKILL.md.blueprint.yaml
- interface: skill-drift.machine.compute-hashes
  version: 1
  blueprint:
    base: skill-root
    path: _rtx/._check_drift_state.py.compute-hashes.blueprint.yaml
- interface: skill-drift.machine.drift-status
  version: 1
  blueprint:
    base: skill-root
    path: _rtx/._check_drift_state.py.drift-status.blueprint.yaml
