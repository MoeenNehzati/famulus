category: skill-making-development-assistant
role: meta-skill
kind: diagnostic
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_check_drift_state.py:Interface
    reason: Read-only skill audit status checks.
  network: []
skill_interface:
  inputs:
  - User request to read or check skill audit state.
  - User or skill request to compute current audit hashes.
  - Optional target skill names.
  outputs:
  - Drift reports comparing recorded audit hashes with current hashes for installed
    skills.
  - Current audit hash payloads for installed blueprint-backed skills.
  side_effects:
  - Writes timestamped Markdown reports under _build/.
  - Does not write audit records.
interfaces:
  machine:
    drift-status:
      description: Read derived audit status for selected installed skill names, exact
        skill root paths, or all observed installed skills.
      version: 1
      usage: status [target ...] [--json] [--with-test-validate]
      allow_all_skills: true
      allowed_callers: []
      patterns:
      - min_positionals: 1
        allow_stdin: false
        allowed_flags:
        - --json
        - --with-test-validate
        - --all
        - --skill-root
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_check_drift_state.py:Interface
      dependencies:
      - kind: python
        name: markdown-it-py
        reason: Parses Markdown dependency references for audit hash computation.
      directly_reads: []
      directly_executes:
      - _rtx/_check_drift_state.py
      directly_writes:
      - _build/
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
    compute-hashes:
      description: Compute current audit hashes for selected installed skill names,
        exact skill root paths, or all observed blueprint-backed skills.
      version: 1
      usage: compute-hashes [target ...] [--json]
      allow_all_skills: true
      allowed_callers: []
      patterns:
      - min_positionals: 1
        allow_stdin: false
        allowed_flags:
        - --json
        - --skill-root
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_check_drift_state.py:Interface
      dependencies:
      - kind: python
        name: markdown-it-py
        reason: Parses Markdown dependency references for audit hash computation.
      directly_reads: []
      directly_executes:
      - _rtx/_check_drift_state.py
      directly_writes: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
      - SKILL.md
      directly_executes: []
      directly_writes: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
