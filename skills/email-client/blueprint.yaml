# Canonical contract for email-client.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder script interfaces as each script contract becomes clearer.

category: automation

# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

cross_platform: false

depends_on:
  {}

suggested_permissions:
  bash:
    - command: ["scripts/email-send.sh"]
      reason: "Migrated from legacy permissions.json."
  network:
    []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

script_interfaces:
  get-message-id:
    id: get-message-id
    description: "Fetch the raw Message-ID header of an IMAP envelope by its numeric ID."
    usage: "[-a nyu|personal] [--folder <folder>] <envelope-id>"
    cwd: skill_root
    command: ["scripts/email-get-message-id.sh"]
    default:
      patterns:
        - name: owner
  send-email:
    id: send-email
    description: "Send an email via msmtp; body comes from stdin."
    usage: "--from nyu|personal --to <addr> [--to <addr>...] --subject <subject> [--attach /path[:DisplayName]] [--in-reply-to <msg-id>] [--references <refs>]"
    cwd: skill_root
    command: ["scripts/email-send.sh"]
    default:
      patterns:
        - name: owner
          allow_stdin: true
