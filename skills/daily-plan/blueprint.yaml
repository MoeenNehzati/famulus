# Canonical contract for daily-plan.

category: workflow-general-assistant
interface_version: 1

cross_platform: false

depends_on:
  cloud-files:
    major_version: 1
    exports:
      - plans-read
      - plans-write
      - plans-delete
      - lists-read
      - lists-write
  g-calendar:
    major_version: 1
    exports:
      - scripts-gcal
  get-weather:
    major_version: 1
    exports:
      - scripts-weather
  list-manager:
    major_version: 1
    exports:
      - read-list
      - read-beautify
      - update-list

suggested_permissions:
  bash:
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner", "_rtx/_plan_orchestrate.py:Interface"]
      reason: "Main orchestration script for plan generation via dispatcher."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner", "_rtx/_render_plan.py:Interface"]
      reason: "Plan rendering helper for display formatting."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner", "_rtx/_state_patch.py:Interface"]
      reason: "Apply plan-local or master-list-backed mutations and show the refreshed plan."
  network: []

skill_interface:
  inputs:
    - User requests to plan today.
    - Calendar, todo, and weather data.
  outputs:
    - Persisted daily plan file.
    - Display-ready plan content.
  side_effects:
    - Writes plan file to cloud storage.
    - May update todo list via list-manager.

interfaces:
  machine:
    orchestrate:
      description: Generate today's plan (or show the existing one, refreshing its Todo/Triage blocks from current list state).
        Pass --forced to regenerate even if a plan already exists.
      usage: '[--forced]'
      allow_all_skills: false
      patterns:
      - min_positionals: 0
        max_positionals: 0
        allow_stdin: false
      - min_positionals: 0
        max_positionals: 0
        allow_stdin: false
        required_flags:
        - --forced
        allowed_flags:
        - --forced
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_plan_orchestrate.py:Interface
      dependencies:
      - kind: python
        name: PyYAML
        reason: Reads and writes YAML plan/list data through plan_runtime.
    plan-storage:
      description: Read, write, check existence of, or delete a plan file in cloud storage by date.
      usage: read|write|exists|delete <date>
      allow_all_skills: false
      patterns:
      - name: read
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
      - name: write
        min_positionals: 2
        max_positionals: 2
        allow_stdin: true
      - name: exists
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
      - name: delete
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
      runtime:
        kind: command
        argv:
        - _rtx/_plan_storage.sh
      dependencies:
      - kind: binary
        name: rclone
        reason: Reads and writes plan files in the configured GDrive remote.
    render-plan:
      description: Extract or reassemble sections of a plan file for rendering.
      usage: <extract|reassemble> <plan-file> <dir>
      allow_all_skills: false
      patterns:
      - min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_render_plan.py:Interface
      dependencies: []
    mutate-plan:
      description: Apply a mutation (hide, show, keep, remove, mark-done, reject, set-deadline, add) to today's plan and display
        the refreshed result.
      usage: '{hide,show,keep,remove,mark-done,reject,set-deadline,add} ...'
      allow_all_skills: false
      patterns:
      - min_positionals: 1
        allow_extra_positionals: true
        allow_stdin: false
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_state_patch.py:Interface
      dependencies:
      - kind: python
        name: PyYAML
        reason: Reads and writes YAML plan/list data through plan_runtime.
