# Canonical contract for daily-plan.

category: automation

interface_version: 1

depends_on:
  cloud-files:
    major_version: 1
    exports:
      - plans-read
      - plans-write
      - plans-delete
  g-calendar:
    major_version: 1
  get-weather:
    major_version: 1
  list-manager:
    major_version: 1
    exports:
      - read-list
      - update-list

suggested_permissions:
  bash:
    - command: ["python3", "scripts/orchestrate.py"]
      reason: "Main orchestration script for plan generation via dispatcher."
    - command: ["python3", "scripts/render-plan.py"]
      reason: "Plan rendering helper for display formatting."
    - command: ["date"]
      reason: "Get current date for plan key (M-D-YY format)."
  network: []

skill_interface:
  inputs:
    - User requests to plan today.
    - Calendar, todo, and weather data.
  outputs:
    - Persisted daily plan file.
    - Display-ready plan content.
  side_effects:
    - Writes plan file to cloud storage.
    - May update todo list via list-manager.

script_interfaces:
  # Orchestration entry point: coordinates all dependencies via dispatcher
  # to generate and persist the daily plan without LLM involvement.
  orchestrate:
    cwd: skill_root
    command: ["python3", "scripts/orchestrate.py"]
    patterns:
      - name: "produce"
        min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        notes: "generate and save new plan (or show existing if already generated today)"
      - name: "output"
        min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        notes: "show existing plan (generate if missing)"
    allow_all_skills: false

  plan-storage:
    cwd: skill_root
    command: ["scripts/plans.sh"]
    patterns:
      - name: "read"
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
      - name: "write"
        min_positionals: 2
        max_positionals: 2
        allow_stdin: true
      - name: "exists"
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
      - name: "delete"
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
    allow_all_skills: false

  render-plan:
    cwd: skill_root
    command: ["python3", "scripts/render-plan.py"]
    patterns:
      - min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: true
    allow_all_skills: false
