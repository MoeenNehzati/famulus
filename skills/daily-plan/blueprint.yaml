category: workflow-general-assistant
role: productivity
kind: planner
cross_platform: false
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_plan_orchestrate.py:Interface
    reason: Main orchestration script for plan generation via dispatcher.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_render_plan.py:Interface
    reason: Plan rendering helper for display formatting.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_state_patch.py:Interface
    reason: Apply plan-local or master-list-backed mutations and show the refreshed
      plan.
  network: []
skill_interface:
  inputs:
  - User requests to plan today.
  - Calendar, todo, and weather data.
  outputs:
  - Persisted daily plan file.
  - Display-ready plan content.
  side_effects:
  - Writes plan file to cloud storage.
  - May update todo list via list-manager.
interfaces:
  machine:
    orchestrate:
      version: 1
      uses_interfaces:
      - interface: cloud-files.machine.plans-read
        version: 1
      - interface: cloud-files.machine.plans-write
        version: 1
      - interface: cloud-files.machine.plans-delete
        version: 1
      - interface: cloud-files.machine.lists-read
        version: 1
      - interface: cloud-files.machine.lists-write
        version: 1
      - interface: g-calendar.machine.scripts-gcal
        version: 1
      - interface: get-weather.machine.scripts-weather
        version: 1
      - interface: list-manager.machine.read-list
        version: 1
      - interface: list-manager.machine.read-beautify
        version: 1
      - interface: list-manager.machine.update-list
        version: 1
      description: Generate today's plan (or show the existing one, refreshing its
        Todo/Triage blocks from current list state). Pass --forced to regenerate even
        if a plan already exists.
      usage: '[--forced]'
      allow_all_skills: false
      patterns:
      - min_positionals: 0
        max_positionals: 0
        allow_stdin: false
      - min_positionals: 0
        max_positionals: 0
        allow_stdin: false
        required_flags:
        - --forced
        allowed_flags:
        - --forced
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Reads and writes YAML plan/list data through plan_runtime.
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_plan_orchestrate.py:Interface
        behavior_sources: []
    plan-storage:
      version: 1
      uses_interfaces:
      - interface: cloud-files.machine.plans-read
        version: 1
      - interface: cloud-files.machine.plans-write
        version: 1
      - interface: cloud-files.machine.plans-delete
        version: 1
      - interface: cloud-files.machine.lists-read
        version: 1
      - interface: cloud-files.machine.lists-write
        version: 1
      - interface: g-calendar.machine.scripts-gcal
        version: 1
      - interface: get-weather.machine.scripts-weather
        version: 1
      - interface: list-manager.machine.read-list
        version: 1
      - interface: list-manager.machine.read-beautify
        version: 1
      - interface: list-manager.machine.update-list
        version: 1
      description: Read, write, check existence of, or delete a plan file in cloud
        storage by date.
      usage: read|write|exists|delete <date>
      allow_all_skills: false
      patterns:
      - name: read
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
      - name: write
        min_positionals: 2
        max_positionals: 2
        allow_stdin: true
      - name: exists
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
      - name: delete
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
      dependencies:
      - kind: binary
        name: rclone
        reason: Reads and writes plan files in the configured GDrive remote.
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_plan_storage.py:Interface
        behavior_sources: []
    render-plan:
      version: 1
      uses_interfaces:
      - interface: cloud-files.machine.plans-read
        version: 1
      - interface: cloud-files.machine.plans-write
        version: 1
      - interface: cloud-files.machine.plans-delete
        version: 1
      - interface: cloud-files.machine.lists-read
        version: 1
      - interface: cloud-files.machine.lists-write
        version: 1
      - interface: g-calendar.machine.scripts-gcal
        version: 1
      - interface: get-weather.machine.scripts-weather
        version: 1
      - interface: list-manager.machine.read-list
        version: 1
      - interface: list-manager.machine.read-beautify
        version: 1
      - interface: list-manager.machine.update-list
        version: 1
      description: Extract or reassemble sections of a plan file for rendering.
      usage: <extract|reassemble> <plan-file> <dir>
      allow_all_skills: false
      patterns:
      - min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: true
      dependencies: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_render_plan.py:Interface
        behavior_sources: []
    mutate-plan:
      version: 1
      uses_interfaces:
      - interface: cloud-files.machine.plans-read
        version: 1
      - interface: cloud-files.machine.plans-write
        version: 1
      - interface: cloud-files.machine.plans-delete
        version: 1
      - interface: cloud-files.machine.lists-read
        version: 1
      - interface: cloud-files.machine.lists-write
        version: 1
      - interface: g-calendar.machine.scripts-gcal
        version: 1
      - interface: get-weather.machine.scripts-weather
        version: 1
      - interface: list-manager.machine.read-list
        version: 1
      - interface: list-manager.machine.read-beautify
        version: 1
      - interface: list-manager.machine.update-list
        version: 1
      description: Apply a mutation (hide, show, keep, remove, mark-done, reject,
        set-deadline, add) to a dated plan and display the refreshed result. Defaults
        to today when --date is omitted.
      usage: '[--date <M-D-YY|YYYY-MM-DD>] {hide,show,keep,remove,mark-done,reject,set-deadline,add}
        ...'
      allow_all_skills: false
      patterns:
      - min_positionals: 1
        allow_extra_positionals: true
        allow_stdin: false
        allowed_flags:
        - --date
        flag_patterns:
          --date: ^(\d{1,2}-\d{1,2}-\d{2}|\d{4}-\d{2}-\d{2})$
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Reads and writes YAML plan/list data through plan_runtime.
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_state_patch.py:Interface
        behavior_sources: []
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
      behavior_sources: []
