# Canonical contract for daily-plan.

category: workflow-general-assistant
interface_version: 1

cross_platform: false

depends_on:
  cloud-files:
    major_version: 1
    exports:
      - plans-read
      - plans-write
      - plans-delete
      - lists-read
      - lists-write
  g-calendar:
    major_version: 1
    exports:
      - scripts-gcal
  get-weather:
    major_version: 1
    exports:
      - scripts-weather
  list-manager:
    major_version: 1
    exports:
      - read-list
      - read-beautify
      - update-list

suggested_permissions:
  bash:
    - command: ["python3", "scripts/orchestrate.py"]
      reason: "Main orchestration script for plan generation via dispatcher."
    - command: ["python3", "scripts/render-plan.py"]
      reason: "Plan rendering helper for display formatting."
    - command: ["python3", "scripts/mutate_plan.py"]
      reason: "Apply plan-local or master-list-backed mutations and show the refreshed plan."
    - command: ["date"]
      reason: "Get current date for plan key (M-D-YY format)."
  network: []

skill_interface:
  inputs:
    - User requests to plan today.
    - Calendar, todo, and weather data.
  outputs:
    - Persisted daily plan file.
    - Display-ready plan content.
  side_effects:
    - Writes plan file to cloud storage.
    - May update todo list via list-manager.

script_interfaces:
  # Orchestration entry point: coordinates all dependencies via dispatcher
  # to generate and persist the daily plan without LLM involvement.
  orchestrate:
    id: orchestrate
    description: "Generate today's plan (or show the existing one, refreshing its Actions/Triage blocks from current list state). Pass --forced to regenerate even if a plan already exists."
    usage: "[--forced]"
    cwd: skill_root
    command: ["python3", "scripts/orchestrate.py"]
    default:
      patterns:
        - min_positionals: 0
          max_positionals: 0
          allow_stdin: false
        - min_positionals: 0
          max_positionals: 0
          allow_stdin: false
          required_flags: ["--forced"]
          allowed_flags: ["--forced"]
      allow_all_skills: false

  plan-storage:
    id: plan-storage
    description: "Read, write, check existence of, or delete a plan file in cloud storage by date."
    usage: "read|write|exists|delete <date>"
    cwd: skill_root
    command: ["scripts/plans.sh"]
    default:
      patterns:
        - name: "read"
          min_positionals: 2
          max_positionals: 2
          allow_stdin: false
        - name: "write"
          min_positionals: 2
          max_positionals: 2
          allow_stdin: true
        - name: "exists"
          min_positionals: 2
          max_positionals: 2
          allow_stdin: false
        - name: "delete"
          min_positionals: 2
          max_positionals: 2
          allow_stdin: false
      allow_all_skills: false

  render-plan:
    id: render-plan
    description: "Extract or reassemble sections of a plan file for rendering."
    usage: "<extract|reassemble> <plan-file> <dir>"
    cwd: skill_root
    command: ["python3", "scripts/render-plan.py"]
    default:
      patterns:
        - min_positionals: 0
          allow_extra_positionals: true
          allow_stdin: true
      allow_all_skills: false

  mutate-plan:
    id: mutate-plan
    description: "Apply a mutation (hide, show, keep, remove, mark-done, reject, set-deadline, add) to today's plan and display the refreshed result."
    usage: "{hide,show,keep,remove,mark-done,reject,set-deadline,add} ..."
    cwd: skill_root
    command: ["python3", "scripts/mutate_plan.py"]
    default:
      patterns:
        - min_positionals: 1
          allow_extra_positionals: true
          allow_stdin: false
      allow_all_skills: false
