# Canonical contract for list-manager.
# This file is hand-authored and comment-rich on purpose. Sync tooling may read
# and validate it, but must not rewrite it in ways that destroy comments.

category: automation

# Bump this major version whenever the exported script contract changes in a
# breaking way.
interface_version: 1

# cloud-files is blueprint-migrated. list-manager uses cloud-files' lists-*
# interfaces to read/write list files under the lists/ directory.
depends_on:
  cloud-files:
    major_version: 1
    exports:
      - lists-read
      - lists-write
      - lists-delete

suggested_permissions:
  bash:
    - command: ["python3", "scripts/lists.py"]
      reason: "Core list operations; supports --cloud flag to handle cloud transport (via invoke_skill_export.py to cloud-files) automatically."
    - command: ["python3", "scripts/beautify.py"]
      reason: "Pure formatter used for user-facing rendering of YAML output."
    - command: ["python3", "scripts/read_beautify.py"]
      reason: "Default human-facing read path for lists; supports --cloud flag for cloud-backed lists."
    - command: ["python3", "scripts/migrate_md.py"]
      reason: "One-time migration utility for importing legacy Markdown lists."
  network: []

skill_interface:
  inputs:
    - Local YAML list files under /tmp after download from cloud storage.
    - User commands such as read, update, create-entry, or init.
  outputs:
    - YAML data for LLM consumption.
    - Beautified list output for user display.
    - Updated local YAML files ready for upload.
  side_effects:
    - Writes the local YAML file for mutating operations.
    - Produces stdout/stderr for orchestration and validation errors.

script_interfaces:
  # The primary local CLI for structured list operations.
  read-list:
    id: read-list
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "read"]
    patterns:
      - min_positionals: 1
        allow_extra_positionals: true
        allow_stdin: false
        notes: "First positional is the local YAML file; remaining positionals are filters."
    allow_all_skills: false
    allowed_callers:
      - daily-plan

  update-list:
    id: update-list
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "update"]
    patterns:
      - name: "file-mode"
        min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        required_flags: ["--file"]
        allowed_flags: ["--file"]
        notes: "Externally supported update mode; caller prepares the patch file."
      - name: "stdin-batch"
        min_positionals: 1
        max_positionals: 1
        allow_stdin: true
        forbidden_flags: ["--file"]
        notes: "Internal convenience mode for the owning skill when feeding YAML directly."
    allow_all_skills: false
    allowed_callers:
      - daily-plan

  read-beautify:
    id: read-beautify
    cwd: skill_root
    command: ["python3", "scripts/read_beautify.py"]
    patterns:
      - min_positionals: 1
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Read a local YAML list file and immediately return pretty output."
    allow_all_skills: false
    allowed_callers:
      - daily-plan

  beautify-list:
    id: beautify-list
    cwd: skill_root
    command: ["python3", "scripts/beautify.py"]
    patterns:
      - min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: true
        notes: "Reads YAML from stdin and renders user-facing list output."
    allow_all_skills: false
    allowed_callers: []

  init-list:
    id: init-list
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "init"]
    patterns:
      - min_positionals: 1
        allow_extra_positionals: true
        allow_stdin: false
    allow_all_skills: false
    allowed_callers: []

  create-entry:
    id: create-entry
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "create-entry"]
    patterns:
      - name: "stdin-mode"
        min_positionals: 2
        max_positionals: 2
        allow_stdin: true
        forbidden_flags: ["--entries"]
      - name: "file-mode"
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
        required_flags: ["--entries"]
        allowed_flags: ["--entries"]
    allow_all_skills: false
    allowed_callers: []

  generate-id:
    id: generate-id
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "gen-id"]
    patterns:
      - min_positionals: 1
        allow_extra_positionals: true
        allow_stdin: false
    allow_all_skills: false
    allowed_callers: []

  migrate-markdown:
    id: migrate-markdown
    cwd: skill_root
    command: ["python3", "scripts/migrate_md.py"]
    patterns:
      - min_positionals: 3
        allow_extra_positionals: true
        allow_stdin: false
    # Internal-only: only list-manager can use for migrations
    allow_all_skills: false
    allowed_callers: []

  # ========================================================================
  # CLOUD-BACKED INTERFACES: Self-contained cloud + local operations
  # ========================================================================
  # These wrap the same scripts with the --cloud flag: the first positional is
  # the list NAME (not a file path); the script downloads, operates, and (for
  # mutations) uploads. Filters follow the name as extra positionals.
  #
  cloud-read:
    id: cloud-read
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "read"]
    patterns:
      - min_positionals: 1
        allow_extra_positionals: true   # name + filters
        allow_stdin: false
        required_flags: ["--cloud"]
        allowed_flags: ["--cloud", "--sort", "-o", "--output"]
        positional_patterns:
          0: "^[a-zA-Z0-9_-]+$"  # List name must be a valid identifier
        notes: "Read cloud list by name (raw YAML), optionally filtered."
    allow_all_skills: false
    allowed_callers: []

  cloud-create-entry:
    id: cloud-create-entry
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "create-entry"]
    patterns:
      - name: "stdin-mode"
        min_positionals: 2
        max_positionals: 2
        allow_stdin: true
        required_flags: ["--cloud"]
        forbidden_flags: ["--entries"]
        positional_patterns:
          0: "^[a-zA-Z0-9_-]+$"  # List name
          1: "^[a-zA-Z0-9_/-]+$" # Target category path or entry id
      - name: "file-mode"
        min_positionals: 2
        max_positionals: 2
        allow_stdin: false
        required_flags: ["--cloud", "--entries"]
        allowed_flags: ["--cloud", "--entries"]
        positional_patterns:
          0: "^[a-zA-Z0-9_-]+$"  # List name
          1: "^[a-zA-Z0-9_/-]+$" # Target category path or entry id
    allow_all_skills: false
    allowed_callers: []

  cloud-update:
    id: cloud-update
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "update"]
    patterns:
      - name: "file-mode"
        min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        required_flags: ["--cloud", "--file"]
        allowed_flags: ["--cloud", "--file"]
        positional_patterns:
          0: "^[a-zA-Z0-9_-]+$"  # List name
        notes: "Update cloud list entries from a patch file."
      - name: "stdin-mode"
        min_positionals: 1
        max_positionals: 1
        allow_stdin: true
        required_flags: ["--cloud"]
        forbidden_flags: ["--file"]
        positional_patterns:
          0: "^[a-zA-Z0-9_-]+$"  # List name
        notes: "Update cloud list entries from a stdin patch."
    allow_all_skills: false
    allowed_callers: []

  cloud-init:
    id: cloud-init
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "init"]
    patterns:
      - min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        required_flags: ["--cloud", "--schema"]
        allowed_flags: ["--cloud", "--schema", "--name"]
        positional_patterns:
          0: "^[a-zA-Z0-9_-]+$"  # New list name
        notes: "Create a new list in cloud storage."
    allow_all_skills: false
    allowed_callers: []

  cloud-delete:
    id: cloud-delete
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "delete"]
    patterns:
      - min_positionals: 2   # list name + at least one id
        allow_extra_positionals: true  # additional ids
        allow_stdin: false
        required_flags: ["--cloud"]
        allowed_flags: ["--cloud"]
        positional_patterns:
          0: "^[a-zA-Z0-9_-]+$"   # List name
          1: "^[0-9a-f]{6}$"       # First entry ID
        notes: "Delete one or more entries by ID from a cloud list."
    allow_all_skills: false
    allowed_callers: []

  cloud-read-beautify:
    id: cloud-read-beautify
    cwd: skill_root
    command: ["python3", "scripts/read_beautify.py"]
    patterns:
      - min_positionals: 1
        allow_extra_positionals: true   # name + filters
        allow_stdin: false
        required_flags: ["--cloud"]
        allowed_flags: ["--cloud", "--sort", "-D", "--no-descriptions", "--markdown", "-o", "--output"]
        positional_patterns:
          0: "^[a-zA-Z0-9_-]+$"  # List name
        notes: "Read a cloud list by name and render it (diff-fenced), optionally filtered."
    allow_all_skills: false
    allowed_callers: []
