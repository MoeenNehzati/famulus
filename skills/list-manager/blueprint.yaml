# Canonical contract for list-manager.
# This file is hand-authored and comment-rich on purpose. Sync tooling may read
# and validate it, but must not rewrite it in ways that destroy comments.

category: productivity-general-assistant
# Bump this major version whenever the exported script contract changes in a
# breaking way.
interface_version: 1

# cloud-files is blueprint-migrated. list-manager uses cloud-files' lists-*
# interfaces to read/write list files under the lists/ directory.
depends_on:
  cloud-files:
    major_version: 1
    exports:
      - lists-read
      - lists-write
      - lists-delete

suggested_permissions:
  bash:
    - command: ["python3", "scripts/lists.py"]
      reason: "Core list operations; supports --cloud flag to handle cloud transport via the shared dispatcher automatically."
    - command: ["python3", "scripts/beautify.py"]
      reason: "Pure formatter used for user-facing rendering of YAML output."
    - command: ["python3", "scripts/read_beautify.py"]
      reason: "Default human-facing read path for lists; supports --cloud flag for cloud-backed lists."
    - command: ["python3", "scripts/migrate_md.py"]
      reason: "One-time migration utility for importing legacy Markdown lists."
  network: []

skill_interface:
  inputs:
    - Local YAML list files under /tmp after download from cloud storage.
    - User commands such as read, update, create-entry, or init.
  outputs:
    - YAML data for LLM consumption.
    - Beautified list output for user display.
    - Updated local YAML files ready for upload.
  side_effects:
    - Writes the local YAML file for mutating operations.
    - Produces stdout/stderr for orchestration and validation errors.

script_interfaces:
  # The primary local CLI for structured list operations.
  read-list:
    id: read-list
    description: "Read a local YAML list file, optionally filtered (raw YAML output). A filtered read preserves structure: it returns the same shape as the input (full doc with categories, or a bare list) pruned to only branches containing a match -- every ancestor category and parent entry of a match is kept for context, and a match is never duplicated as both a nested child and an independent top-level result."
    usage: "<file> [filters]"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "read"]
    default:
      patterns:
        - min_positionals: 1
          allow_extra_positionals: true
          allow_stdin: false
          notes: "First positional is the local YAML file; remaining positionals are filters. Filtered output is a pruned tree (or pruned list, if the input itself was a bare list), not a flat list of matches -- do not assume flat-list shape."
      allow_all_skills: false
      allowed_callers:
        - daily-plan

  describe-schema:
    id: describe-schema
    description: "Describe entry-level fields (types/required/enums) for a list schema."
    usage: "<schema> [field]"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "describe-schema"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 2
          allow_stdin: false
          notes: "First positional is the schema name (todo, triage, default); optional second positional is a field name, or '*'/omitted for all fields. Purely local and read-only -- no cloud variant needed."
      allow_all_skills: false
      allowed_callers: []

  update-list:
    id: update-list
    description: "Update entries in a local YAML list file from a patch file (keyed by id) or stdin."
    usage: "<file> --file /tmp/patch.yaml"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "update"]
    default:
      patterns:
        - name: "file-mode"
          min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          required_flags: ["--file"]
          allowed_flags: ["--file"]
          notes: "Externally supported update mode; caller prepares the patch file."
        - name: "stdin-batch"
          min_positionals: 1
          max_positionals: 1
          allow_stdin: true
          forbidden_flags: ["--file"]
          notes: "Internal convenience mode for the owning skill when feeding YAML directly."
      allow_all_skills: false
      allowed_callers:
        - daily-plan

  read-beautify:
    id: read-beautify
    description: "Read a local YAML list file and render it for display (nested bullet-list markdown by default; --table for a flat GFM table, --diff for the legacy diff-fenced view)."
    usage: "<file> [filters] [--sort FIELD] [-D|--no-descriptions] [--markdown|--table|--diff] [--no-ids] [-o FILE]"
    cwd: skill_root
    command: ["python3", "scripts/read_beautify.py"]
    default:
      patterns:
        - min_positionals: 1
          allow_extra_positionals: true
          allow_stdin: false
          notes: "Read a local YAML list file and immediately return pretty output. No allowed_flags restriction: --sort/-D/--markdown/--table/--diff/--no-ids/-o all pass through."
      allow_all_skills: false
      allowed_callers:
        - daily-plan

  beautify-list:
    id: beautify-list
    description: "Render YAML list entries from stdin (nested bullet-list markdown by default for todo/triage; --table for a flat GFM table, --diff for the legacy diff-fenced view). Pass YAML via stdin using `dispatcher --stdin`."
    usage: "[-D|--no-descriptions] [--markdown|--table|--diff] [--relative-deadlines] [--ids]"
    cwd: skill_root
    command: ["python3", "scripts/beautify.py"]
    default:
      patterns:
        - min_positionals: 0
          allow_extra_positionals: true
          allow_stdin: true
          notes: "Reads YAML from stdin and renders user-facing list output. No allowed_flags restriction: -D/--markdown/--table/--diff/--relative-deadlines/--ids all pass through."
      allow_all_skills: false
      allowed_callers: []

  init-list:
    id: init-list
    description: "Create a new empty local YAML list file."
    usage: "<file> [--schema <name>]"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "init"]
    default:
      patterns:
        - min_positionals: 1
          allow_extra_positionals: true
          allow_stdin: false
      allow_all_skills: false
      allowed_callers: []

  create-entry:
    id: create-entry
    description: "Add entries to a local YAML list under a category path."
    usage: "<file> <category/path> --entries /tmp/entry.yaml"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "create-entry"]
    default:
      patterns:
        - name: "stdin-mode"
          min_positionals: 2
          max_positionals: 2
          allow_stdin: true
          forbidden_flags: ["--entries"]
        - name: "file-mode"
          min_positionals: 2
          max_positionals: 2
          allow_stdin: false
          required_flags: ["--entries"]
          allowed_flags: ["--entries"]
      allow_all_skills: false
      allowed_callers: []

  generate-id:
    id: generate-id
    description: "Generate one or more collision-free 6-char entry IDs against a local list file."
    usage: "<file> [--count N]"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "gen-id"]
    default:
      patterns:
        - min_positionals: 1
          allow_extra_positionals: true
          allow_stdin: false
      allow_all_skills: false
      allowed_callers: []

  migrate-markdown:
    id: migrate-markdown
    description: "Migrate a legacy Markdown list to YAML format."
    usage: "<source.md> <dest.yaml> --schema <schema>"
    cwd: skill_root
    command: ["python3", "scripts/migrate_md.py"]
    default:
      patterns:
        - min_positionals: 3
          allow_extra_positionals: true
          allow_stdin: false
      # Internal-only: only list-manager can use for migrations
      allow_all_skills: false
      allowed_callers: []

  # ========================================================================
  # CLOUD-BACKED INTERFACES: Self-contained cloud + local operations
  # ========================================================================
  # These wrap the same scripts with the --cloud flag: the first positional is
  # the list NAME (not a file path); the script downloads, operates, and (for
  # mutations) uploads. Filters follow the name as extra positionals.
  #
  cloud-read:
    id: cloud-read
    description: "Read a cloud list by name (raw YAML), optionally filtered. A filtered read preserves structure: same shape as the full doc, pruned to only branches containing a match -- ancestor categories/parent entries are kept, and a match is never duplicated as both a nested child and a top-level result."
    usage: "<name> [filters] --cloud"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "read"]
    default:
      patterns:
        - min_positionals: 1
          allow_extra_positionals: true   # name + filters
          allow_stdin: false
          required_flags: ["--cloud"]
          allowed_flags: ["--cloud", "--sort", "-o", "--output"]
          positional_patterns:
            0: "^[a-zA-Z0-9_-]+$"  # List name must be a valid identifier
          notes: "Read cloud list by name (raw YAML), optionally filtered. Filtered output is a pruned tree, not a flat list of matches -- do not assume flat-list shape."
      allow_all_skills: false
      allowed_callers: []

  cloud-create-entry:
    id: cloud-create-entry
    description: "Add entries to a cloud list under a category path."
    usage: "<name> <category/path> --cloud --entries /tmp/entry.yaml"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "create-entry"]
    default:
      patterns:
        - name: "stdin-mode"
          min_positionals: 2
          max_positionals: 2
          allow_stdin: true
          required_flags: ["--cloud"]
          forbidden_flags: ["--entries"]
          positional_patterns:
            0: "^[a-zA-Z0-9_-]+$"  # List name
            1: "^[a-zA-Z0-9_/-]+$" # Target category path or entry id
        - name: "file-mode"
          min_positionals: 2
          max_positionals: 2
          allow_stdin: false
          required_flags: ["--cloud", "--entries"]
          allowed_flags: ["--cloud", "--entries"]
          positional_patterns:
            0: "^[a-zA-Z0-9_-]+$"  # List name
            1: "^[a-zA-Z0-9_/-]+$" # Target category path or entry id
      allow_all_skills: false
      allowed_callers: []

  cloud-update:
    id: cloud-update
    description: "Update entries in a cloud list from a patch file (keyed by id)."
    usage: "<name> --cloud --file /tmp/patch.yaml"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "update"]
    default:
      patterns:
        - name: "file-mode"
          min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          required_flags: ["--cloud", "--file"]
          allowed_flags: ["--cloud", "--file"]
          positional_patterns:
            0: "^[a-zA-Z0-9_-]+$"  # List name
          notes: "Update cloud list entries from a patch file."
        - name: "stdin-mode"
          min_positionals: 1
          max_positionals: 1
          allow_stdin: true
          required_flags: ["--cloud"]
          forbidden_flags: ["--file"]
          positional_patterns:
            0: "^[a-zA-Z0-9_-]+$"  # List name
          notes: "Update cloud list entries from a stdin patch."
      allow_all_skills: false
      allowed_callers: []

  cloud-init:
    id: cloud-init
    description: "Create a new list in cloud storage."
    usage: "<name> --cloud --schema <schema>"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "init"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          required_flags: ["--cloud", "--schema"]
          allowed_flags: ["--cloud", "--schema", "--name"]
          positional_patterns:
            0: "^[a-zA-Z0-9_-]+$"  # New list name
          notes: "Create a new list in cloud storage."
      allow_all_skills: false
      allowed_callers: []

  cloud-delete:
    id: cloud-delete
    description: "Delete one or more entries by id from a cloud list. Ids come after --cloud."
    usage: "<name> --cloud <id> [<id>...]"
    cwd: skill_root
    command: ["python3", "scripts/lists.py", "delete"]
    default:
      patterns:
        - min_positionals: 2   # list name + at least one id
          allow_extra_positionals: true  # additional ids
          allow_stdin: false
          required_flags: ["--cloud"]
          allowed_flags: ["--cloud"]
          positional_patterns:
            0: "^[a-zA-Z0-9_-]+$"   # List name
            1: "^[0-9a-f]{6}$"       # First entry ID
          notes: "Delete one or more entries by ID from a cloud list."
      allow_all_skills: false
      allowed_callers: []

  cloud-read-beautify:
    id: cloud-read-beautify
    description: "Read a cloud list by name and render it (nested bullet-list markdown by default, id-annotated; --table for a flat GFM table, --diff for the legacy diff-fenced view). Relay stdout verbatim."
    usage: "<name> [filters] --cloud"
    cwd: skill_root
    command: ["python3", "scripts/read_beautify.py"]
    default:
      patterns:
        - min_positionals: 1
          allow_extra_positionals: true   # name + filters
          allow_stdin: false
          required_flags: ["--cloud"]
          allowed_flags: ["--cloud", "--sort", "-D", "--no-descriptions", "--markdown", "--table", "--diff", "-o", "--output"]
          positional_patterns:
            0: "^[a-zA-Z0-9_-]+$"  # List name
          notes: "Read a cloud list by name and render it as nested bullet-list markdown by default, optionally filtered."
      allow_all_skills: false
      allowed_callers: []
