# Canonical contract for math-dependency-graph.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder script interfaces as each script contract becomes clearer.

category:
  - document-oriented
  - mathematical-analysis

# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

depends_on:
  {}

suggested_permissions:
  bash:
    - command: ["python3"]
      reason: "Migrated from legacy permissions.json."
  network:
    []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

script_interfaces:
  scripts-build-math-dependency-graph:
    id: scripts-build-math-dependency-graph
    description: "Render an interactive standalone HTML math dependency graph from canonical JSON."
    usage: "<source.json> [--tex-entry <entrypoint.tex>] [--html-out <path>] [--macro-file <path>] [--refresh-macros] [--reduce-transitive-edges]"
    cwd: skill_root
    command: ["python3", "scripts/build_math_dependency_graph.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/build_math_dependency_graph.py; tighten this contract when needed."
    exported_interface: []
  scripts-extract-mathjax-macros:
    id: scripts-extract-mathjax-macros
    description: "Extract MathJax macro definitions from a TeX entrypoint, recursively following \\input/\\include."
    usage: "<entrypoint.tex> [--out <path>]"
    cwd: skill_root
    command: ["python3", "scripts/extract_mathjax_macros.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/extract_mathjax_macros.py; tighten this contract when needed."
    exported_interface: []
  scripts-serve-graph:
    id: scripts-serve-graph
    description: "Serve graph HTML from a local directory with no-cache headers for repeated browser inspection."
    usage: "[--directory <path>] [--host <host>] [--port <port>]"
    cwd: skill_root
    command: ["python3", "scripts/serve_graph.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/serve_graph.py; tighten this contract when needed."
    exported_interface: []
