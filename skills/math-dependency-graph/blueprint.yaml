# Canonical contract for math-dependency-graph.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder machine interfaces as each runtime contract becomes clearer.

category: research-assistant
# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

depends_on: {}

suggested_permissions:
  bash:
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner",
        "_rtx/_graph_builder.py:Interface"]
      reason: "Render math dependency graph HTML from canonical JSON."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner",
        "_rtx/_tex_macro_reader.py:Interface"]
      reason: "Extract MathJax macro definitions from TeX sources."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner",
        "_rtx/_graph_server.py:Interface"]
      reason: "Serve graph HTML locally for inspection."
  network: []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

interfaces:
  machine:
    scripts-build-math-dependency-graph:
      description: Render an interactive standalone HTML math dependency graph from
        canonical JSON.
      usage: <source.json> [--tex-entry <entrypoint.tex>] [--html-out <path>] [--macro-file
        <path>] [--refresh-macros] [--reduce-transitive-edges]
      patterns:
        - name: owner
          allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_graph_builder.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
        - _rtx/_graph_builder.py
      directly_writes: []
    scripts-extract-mathjax-macros:
      description: Extract MathJax macro definitions from a TeX entrypoint, recursively
        following \input/\include.
      usage: <entrypoint.tex> [--out <path>]
      patterns:
        - name: owner
          allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_tex_macro_reader.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
        - _rtx/_tex_macro_reader.py
      directly_writes: []
    scripts-serve-graph:
      description: Serve graph HTML from a local directory with no-cache headers for
        repeated browser inspection.
      usage: '[--directory <path>] [--host <host>] [--port <port>]'
      patterns:
        - name: owner
          allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_graph_server.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
        - _rtx/_graph_server.py
      directly_writes: []
  llm:
    default:
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
        - SKILL.md
      directly_executes: []
      directly_writes: []
