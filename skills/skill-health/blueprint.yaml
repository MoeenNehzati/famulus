# Canonical contract for skill-health.

category: skill-making-development-assistant
interface_version: 1

depends_on: {}

suggested_permissions:
  bash: []
  network: []

skill_interface:
  inputs:
    - User request to read, invalidate, migrate, or record skill health state.
    - Optional target skill name.
  outputs:
    - Health reports and local health-record updates once machine interfaces are implemented.
  side_effects:
    - Future interfaces may create or update local skills/<skill>/.health.json records.

interfaces:
  machine: {}
  llm:
    default:
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
        - SKILL.md
      directly_executes: []
      directly_writes: []
