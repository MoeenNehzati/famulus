schema_version: 2
blueprint_type: skill
id: skill-audit
category: skill-making-development-assistant
role: meta-skill
kind: auditor
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_audit_certifier.py:Interface
    reason: Run mechanical checks, compute audit hashes, and write audit records.
  network: []
skill_interface:
  inputs:
  - User request to certify audit records for one or more installed skills.
  - Optional installed skill names or exact skill root paths.
  outputs:
  - independent per-target results distinguishing reused, written, not-written, and failed outcomes.
  side_effects:
  - Runs blueprint sync checks, validators, and tests.
  - Writes authenticated node health and pooled review artifacts under certified skill roots.
  - Creates or reuses the local skill-audit health authentication key.
  - Reads each target blueprint graph, policy and schema inputs, and Git commit readiness before stamping.
interfaces:
- interface: skill-audit.llm.default
  version: 1
  blueprint:
    base: skill-root
    path: .SKILL.md.blueprint.yaml
- interface: skill-audit.machine.certify
  version: 1
  blueprint:
    base: skill-root
    path: _rtx/._audit_certifier.py.blueprint.yaml
