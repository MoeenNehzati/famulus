schema_version: 2
blueprint_type: llm-interface
id: connect-google.llm.connect-services
version: 1
description: Install or reuse a Google Desktop OAuth client and hand selected Google services to their owning skills.
binding:
  kind: instruction-file
  path: llm_interfaces/connect-services.md
allowed_callers:
- connect-google
uses_interfaces:
- interface: connect-google.machine.client-status
  version: 1
- interface: connect-google.machine.install-client
  version: 1
behavior_sources:
- source: connect-google.source.personal-preferences-connect-services
  version: 1
  blueprint:
    base: skill-root
    path: personal-preferences/.connect-services.md.blueprint.yaml
  reason: Apply the user's optional client-installation and service-selection preferences.
direct_io:
  reads:
  - medium: prompt
    access: read
    system: agent-runtime
    content: config
    format: text
    sensitivity: user-private
    reason: Obtain the local path of a Desktop OAuth client when installation is needed.
  writes: []
  network: []
owns_filesystem: []
