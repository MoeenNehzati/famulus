schema_version: 2
blueprint_type: skill
id: connect-google
category: workflow-general-assistant
role: integration
kind: setup
skill_interface:
  inputs:
  - A request to prepare or reuse a Google Desktop OAuth client.
  outputs:
  - A privately installed canonical client and service-owned authorization handoffs.
  side_effects:
  - May install or replace the canonical OAuth client after confirmation.
default_interface:
  version: 1
  description: Route Google OAuth-client preparation according to whether a valid Desktop client is already installed.
  allow_all_skills: true
  uses_interfaces:
  - interface: connect-google.machine.client-status
    version: 1
  - interface: connect-google.llm.create-client
    version: 1
  - interface: connect-google.llm.connect-services
    version: 1
  behavior_sources:
  - source: connect-google.source.personal-preferences-default
    version: 1
    blueprint:
      base: skill-root
      path: personal-preferences/.default.md.blueprint.yaml
    reason: Apply the user's optional routing preferences.
  direct_io:
    reads:
    - medium: prompt
      access: read
      system: agent-runtime
      content: config
      format: text
      sensitivity: user-private
      reason: Determine whether the user has a client JSON and which services they want.
    writes: []
    network: []
  owns_filesystem: []
interfaces:
- interface: connect-google.llm.create-client
  version: 1
  blueprint:
    base: skill-root
    path: llm_interfaces/.create-client.md.blueprint.yaml
- interface: connect-google.llm.connect-services
  version: 1
  blueprint:
    base: skill-root
    path: llm_interfaces/.connect-services.md.blueprint.yaml
- interface: connect-google.machine.client-status
  version: 1
  blueprint:
    base: skill-root
    path: _rtx/._client_config.py.client-status.blueprint.yaml
- interface: connect-google.machine.install-client
  version: 1
  blueprint:
    base: skill-root
    path: _rtx/._client_config.py.install-client.blueprint.yaml
