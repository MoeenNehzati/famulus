# Canonical contract for get-weather.

category: productivity-general-assistant
interface_version: 1

cross_platform: false

depends_on: {}

suggested_permissions:
  bash:
    - command: ["scripts/weather.sh"]
      reason: "Weather lookup tool."
  network: []

skill_interface:
  inputs:
    - User requests for weather information.
  outputs:
    - Current weather data and forecasts.
  side_effects:
    - May query weather APIs.

script_interfaces:
  scripts-weather:
    id: scripts-weather
    description: "Fetch weather data for a location and date range, returning hourly forecast JSON."
    usage: "[--date <YYYY-MM-DD>] [--end-date <YYYY-MM-DD>] [--location <loc>]"
    cwd: skill_root
    command: ["scripts/weather.sh"]
    default:
      patterns:
        - min_positionals: 0
          allow_extra_positionals: true
          allow_stdin: false
      # Public: anyone can use weather data
      allow_all_skills: true
      allowed_callers: []
