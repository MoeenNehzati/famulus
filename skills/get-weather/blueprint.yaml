category: productivity-general-assistant
role: productivity
kind: client
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_weather_client.py:Interface
    reason: Weather lookup tool.
  network: []
skill_interface:
  inputs:
  - User requests for weather information.
  outputs:
  - Current weather data and forecasts.
  side_effects:
  - May query weather APIs.
interfaces:
  machine:
    scripts-weather:
      version: 1
      description: Fetch weather data for a location and date range, returning hourly
        forecast JSON.
      usage: '[--date <YYYY-MM-DD>] [--end-date <YYYY-MM-DD>] [--location <loc>]'
      allow_all_skills: true
      allowed_callers: []
      patterns:
      - min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
      dependencies: []
      direct_io:
        reads: []
        writes:
        - medium: stdout
          access: write
          content: forecast
          format: json
          sensitivity: user-private
        network:
        - medium: network-request
          access: request
          system: weather-service
          content: forecast
          format: json
          sensitivity: user-private
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_weather_client.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      direct_io:
        reads:
        - medium: prompt
          access: read
          content: plan-request
          format: text
          sensitivity: user-private
        writes:
        - medium: prompt
          access: write
          content: forecast
          format: markdown
          sensitivity: derived-private
        network: []
      owns_filesystem: []
      allow_all_skills: true
      behavior_sources: []
