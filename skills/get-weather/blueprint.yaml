# Canonical contract for get-weather.

category: productivity-general-assistant
interface_version: 1

cross_platform: false

depends_on: {}

suggested_permissions:
  bash:
    - command: ["_rtx/_weather_client.sh"]
      reason: "Weather lookup tool."
  network: []

skill_interface:
  inputs:
    - User requests for weather information.
  outputs:
    - Current weather data and forecasts.
  side_effects:
    - May query weather APIs.

interfaces:
  machine:
    scripts-weather:
      description: Fetch weather data for a location and date range, returning hourly
        forecast JSON.
      usage: '[--date <YYYY-MM-DD>] [--end-date <YYYY-MM-DD>] [--location <loc>]'
      allow_all_skills: true
      allowed_callers: []
      patterns:
        - min_positionals: 0
          allow_extra_positionals: true
          allow_stdin: false
      runtime:
        kind: command
        argv:
          - _rtx/_weather_client.sh
      dependencies:
        - kind: binary
          name: curl
          reason: Fetches geocoding, IP-location, and forecast API responses.
        - kind: binary
          name: jq
          reason: Parses and formats JSON API responses.
      directly_reads: []
      directly_executes:
        - _rtx/_weather_client.sh
      directly_writes: []
  llm:
    default:
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
        - SKILL.md
      directly_executes: []
      directly_writes: []
