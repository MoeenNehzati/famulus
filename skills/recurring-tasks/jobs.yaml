jobs:
  - name: email-triage
    description: "Triage new emails into todo and potential-actions lists"
    # PATH: systemd user units do not inherit the interactive shell's PATH,
    #   so ~/.local/bin must be set explicitly.
    #
    # DBUS_SESSION_BUS_ADDRESS: the systemd user session provides a persistent
    #   D-Bus socket at /run/user/<UID>/bus. email-triage/email-client use
    #   `secret-tool` to fetch IMAP/SMTP passwords from the GNOME keyring over
    #   D-Bus; pointing to the socket ensures this works from non-interactive
    #   service contexts.
    #   UID 1000 is hardcoded; adjust if user changes.
    command: "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus PATH=$HOME/.local/bin:$PATH {skill_dir}/scripts/run-skill.sh email-triage"
    schedule: "0 * * * *"
    enabled: true

  - name: daily-plan
    description: "Generate or show today's daily plan, including potential-actions triage"
    command: "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus PATH=$HOME/.local/bin:$PATH {skill_dir}/scripts/run-skill.sh daily-plan"
    schedule: "0 * * * *"
    enabled: true
