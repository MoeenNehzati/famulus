category: system-assistant
interface_version: 1

cross_platform: false

depends_on:
  install-assistant-tools:
    major_version: 1

suggested_permissions:
  bash:
    - command: ["scripts/setup.sh"]
      reason: "Initial setup: syncs unit files, installs healthcheck cron entry."
    - command: ["scripts/sync-units.py"]
      reason: "Write/remove systemd user unit files to match jobs.yaml."
    - command: ["scripts/enable-job.py"]
      reason: "Enable a recurring job in jobs.yaml."
    - command: ["scripts/disable-job.py"]
      reason: "Disable a recurring job in jobs.yaml."
    - command: ["scripts/test-job.py"]
      reason: "Trigger a job immediately via systemd and report pass/fail."
    - command: ["scripts/test-live-job.py"]
      reason: "End-to-end live test through the real assistant backend."
    - command: ["scripts/view-logs.sh"]
      reason: "Tail run logs for a job."
    - command: ["scripts/status.sh"]
      reason: "List active timers and service status."
    - command: ["scripts/healthcheck.sh"]
      reason: "Run pre-flight and per-job health checks."
    - command: ["systemctl"]
      reason: "Manage systemd user units."
    - command: ["journalctl"]
      reason: "Read systemd journal for job diagnostics."

script_interfaces:
  # ── Model-callable interfaces ──────────────────────────────────────────────

  scripts-enable-job:
    id: scripts-enable-job
    description: "Enable a job by setting enabled: true in jobs.yaml and syncing unit files."
    usage: "<name> [--jobs-file JOBS_FILE] [--no-sync]"
    cwd: skill_root
    command: ["python3", "scripts/enable-job.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-disable-job:
    id: scripts-disable-job
    description: "Disable a job by setting enabled: false in jobs.yaml and syncing unit files."
    usage: "<name> [--jobs-file JOBS_FILE] [--no-sync]"
    cwd: skill_root
    command: ["python3", "scripts/disable-job.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-status:
    id: scripts-status
    description: "List all active ai-* timers; with a job name also shows service status and recent journal entries."
    usage: "[job-name]"
    cwd: skill_root
    command: ["scripts/status.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-view-logs:
    id: scripts-view-logs
    description: "Tail the run log for a job; pass 'healthcheck' as job name to view the monitor log."
    usage: "<job-name> [lines]"
    cwd: skill_root
    command: ["scripts/view-logs.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-test-job:
    id: scripts-test-job
    description: "Trigger a job immediately via systemd, wait up to 6 minutes, and report pass/fail with log output."
    usage: "<name> [--jobs-file JOBS_FILE]"
    cwd: skill_root
    command: ["python3", "scripts/test-job.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-test-live-job:
    id: scripts-test-live-job
    description: "End-to-end live test: creates a temporary skill and job, runs it through the real assistant backend, verifies output."
    usage: "--backend {claude|codex} [--keep-artifacts]"
    cwd: skill_root
    command: ["python3", "scripts/test-live-job.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-healthcheck:
    id: scripts-healthcheck
    description: "Run pre-flight and per-job health checks for all enabled recurring tasks; sends a desktop notification on failure."
    usage: ""
    cwd: skill_root
    command: ["scripts/healthcheck.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: false

  scripts-setup:
    id: scripts-setup
    description: "Verify prerequisites, sync systemd unit files from jobs.yaml, install the healthcheck cron entry, and list active timers."
    usage: "[--migrate-cron]"
    cwd: skill_root
    command: ["scripts/setup.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-sync-units:
    id: scripts-sync-units
    description: "Write, update, or remove systemd user unit files and per-job runner scripts to match jobs.yaml."
    usage: "[--unit-dir UNIT_DIR] [--jobs-file JOBS_FILE] [--migrate-cron]"
    cwd: skill_root
    command: ["python3", "scripts/sync-units.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  # ── Internal interfaces (not model-callable; no description) ───────────────

  scripts-job-utils:
    id: scripts-job-utils
    cwd: skill_root
    command: ["python3", "scripts/_job_utils.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-env:
    id: scripts-env
    cwd: skill_root
    command: ["scripts/env.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-invoke-agent:
    id: scripts-invoke-agent
    cwd: skill_root
    command: ["scripts/invoke-agent.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  scripts-run-skill:
    id: scripts-run-skill
    cwd: skill_root
    command: ["scripts/run-skill.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true

  runners-daily-plan:
    id: runners-daily-plan
    cwd: skill_root
    command: ["scripts/runners/daily-plan.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: false

  runners-email-triage:
    id: runners-email-triage
    cwd: skill_root
    command: ["scripts/runners/email-triage.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: false
