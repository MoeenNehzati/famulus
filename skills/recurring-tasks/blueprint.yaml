        notes: "Auto-migrated placeholder interface for scripts/healthcheck.sh; tighten this contract when needed."
    exported_interface: []
  scripts-invoke-agent:
    id: scripts-invoke-agent
    description: "Invokes a skill via the assistant command using the backend set in $ASSISTANT_DEFAULT (claude or codex)."
    usage: "<skill-name>"
    cwd: skill_root
    command: ["scripts/invoke-agent.sh"]
    interface:
