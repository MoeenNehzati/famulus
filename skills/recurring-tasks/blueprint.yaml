category: system-assistant
interface_version: 1

cross_platform: false

depends_on:
  install-assistant-tools:
    major_version: 2

suggested_permissions:
  bash:
    - command: ["_rtx/_setup_runner.sh"]
      reason: "Initial setup: syncs unit files, installs healthcheck cron entry."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner", "_rtx/_unit_writer.py:Interface"]
      reason: "Write/remove systemd user unit files to match jobs.yaml."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner", "_rtx/_job_control.py:Interface"]
      reason: "Consolidated interface: enable/disable/test/view-logs jobs."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner", "_rtx/_healthcheck_probe.py:Interface"]
      reason: "Run pre-flight and per-job health checks."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner", "_rtx/_ensure_agent_env.py:Interface"]
      reason: "Ensure recurring-tasks' own PATH/env prerequisites are in place."
    - command: ["python3", "-m", "officina.runtime.python_machine_interface_runner", "_rtx/_job_utils.py:Interface"]
      reason: "Expose legacy recurring job helper module through the dispatcher runtime contract."
    - command: ["systemctl"]
      reason: "Manage systemd user units."
    - command: ["journalctl"]
      reason: "Read systemd journal for job diagnostics."

interfaces:
  machine:
    scripts-enable:
      description: 'Enable a job by setting enabled: true in jobs.yaml and syncing unit files.'
      usage: <name>
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - enable
      dependencies:
      - kind: python
        name: PyYAML
        reason: Reads and writes jobs.yaml.
      - kind: binary
        name: systemctl
        reason: Enables and starts generated user timers.
    scripts-disable:
      description: 'Disable a job by setting enabled: false in jobs.yaml and syncing unit files.'
      usage: <name>
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - disable
      dependencies:
      - kind: python
        name: PyYAML
        reason: Reads and writes jobs.yaml.
      - kind: binary
        name: systemctl
        reason: Disables generated user timers.
    scripts-test:
      description: Trigger a job immediately via systemd, show output and status.
      usage: <name>
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - test
      dependencies:
      - kind: python
        name: PyYAML
        reason: Reads jobs.yaml before running the job.
      - kind: binary
        name: systemctl
        reason: Starts the generated user service immediately.
    scripts-view-logs:
      description: Tail the run log for a job (default 50 lines).
      usage: <job-name> [--lines N]
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - view-logs
      dependencies:
      - kind: python
        name: PyYAML
        reason: Loads jobs.yaml before locating the run log.
    scripts-status:
      description: List all active ai-* timers, next fire times, and service status.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: false
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - status
      dependencies:
      - kind: python
        name: PyYAML
        reason: Loads jobs.yaml in the management CLI.
      - kind: binary
        name: systemctl
        reason: Lists active generated user timers.
    scripts-sync:
      description: Regenerate systemd unit files from jobs.yaml.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: false
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_unit_writer.py:Interface
      dependencies:
      - kind: python
        name: PyYAML
        reason: Reads jobs.yaml while generating unit files.
      - kind: binary
        name: systemctl
        reason: Reloads and enables generated user timers.
    scripts-healthcheck:
      description: Run pre-flight and per-job health checks for all enabled recurring tasks; sends a desktop notification
        on failure.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: false
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_healthcheck_probe.py:Interface
      dependencies:
      - kind: python
        name: PyYAML
        reason: Reads jobs.yaml for enabled jobs.
      - kind: binary
        name: systemctl
        reason: Checks user service and timer health.
      - kind: binary
        name: journalctl
        reason: Reports recent service logs for failing jobs.
    scripts-setup:
      description: Verify prerequisites, sync systemd unit files from jobs.yaml, install the healthcheck cron entry, and list
        active timers.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: false
      runtime:
        kind: command
        argv:
        - _rtx/_setup_runner.sh
      dependencies:
      - kind: python
        name: PyYAML
        reason: Validates that jobs.yaml tooling can load YAML.
      - kind: binary
        name: systemctl
        reason: Lists and manages generated user timers.
      - kind: binary
        name: crontab
        reason: Installs the recurring healthcheck cron entry.
    scripts-ensure-agent-env:
      description: Idempotently ensure recurring-tasks' own PATH/env prerequisites and systemd AI_AGENT_COMMAND_TEMPLATE are
        in place. Also run automatically by scripts-setup.
      usage: --repo-root DIR --home DIR --bin-dir DIR [--dry-run]
      patterns:
      - name: owner
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_ensure_agent_env.py:Interface
      dependencies:
      - kind: binary
        name: systemctl
        reason: Publishes recurring-task environment variables to the user manager when available.
    scripts-job-utils:
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_job_utils.py:Interface
      dependencies: []
    scripts-invoke-agent:
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: command
        argv:
        - _rtx/_agent_invoker.sh
      dependencies: []
