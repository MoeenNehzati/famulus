# Canonical contract for recurring-tasks.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder script interfaces as each script contract becomes clearer.

category: automation

# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

cross_platform: false

depends_on:
  install-assistant-tools:
    major_version: 1

suggested_permissions:
  bash:
    - command: ["scripts/setup.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/sync-units.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/enable-job.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/disable-job.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/test-job.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/test-live-job.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/view-logs.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/status.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["systemctl"]
      reason: "Migrated from legacy permissions.json."
    - command: ["journalctl"]
      reason: "Migrated from legacy permissions.json."
    - command: ["grep"]
      reason: "Migrated from legacy permissions.json."
    - command: ["tail"]
      reason: "Migrated from legacy permissions.json."
  network:
    []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

script_interfaces:
  scripts-job-utils:
    id: scripts-job-utils
    description: "Shared helper library providing set_enabled() used by enable-job and disable-job; not a standalone CLI tool."
    usage: "(internal library — not invoked directly)"
    cwd: skill_root
    command: ["python3", "scripts/_job_utils.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/_job_utils.py; tighten this contract when needed."
    exported_interface: []
  scripts-disable-job:
    id: scripts-disable-job
    description: "Disables a job by setting enabled: false in jobs.yaml and syncing unit files."
    usage: "<name> [--jobs-file JOBS_FILE] [--no-sync]"
    cwd: skill_root
    command: ["python3", "scripts/disable-job.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/disable-job.py; tighten this contract when needed."
    exported_interface: []
  scripts-enable-job:
    id: scripts-enable-job
    description: "Enables a job by setting enabled: true in jobs.yaml and syncing unit files."
    usage: "<name> [--jobs-file JOBS_FILE] [--no-sync]"
    cwd: skill_root
    command: ["python3", "scripts/enable-job.py"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/enable-job.py; tighten this contract when needed."
    exported_interface: []
  scripts-env:
    id: scripts-env
    description: "Exports PATH additions required by invoke-agent.sh in non-login contexts; intended to be sourced, not run directly."
    usage: "(sourced by invoke-agent.sh — not invoked directly)"
    cwd: skill_root
    command: ["scripts/env.sh"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
        allow_stdin: false
        notes: "Auto-migrated placeholder interface for scripts/env.sh; tighten this contract when needed."
    exported_interface: []
  scripts-healthcheck:
    id: scripts-healthcheck
    description: "Runs pre-flight and per-job health checks for all enabled recurring tasks and sends a desktop notification on any failure."
    usage: ""
    cwd: skill_root
    command: ["scripts/healthcheck.sh"]
    interface:
      default:
        min_positionals: 0
        allow_extra_positionals: true
