category: system-assistant
role: system-operations
kind: scheduler
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_setup_runner.py:Interface
    reason: 'Initial setup: syncs unit files, installs healthcheck cron entry.'
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_unit_writer.py:Interface
    reason: Write/remove systemd user unit files to match jobs.yaml.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_job_control.py:Interface
    reason: 'Consolidated interface: enable/disable/test/view-logs jobs.'
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_healthcheck_probe.py:Interface
    reason: Run pre-flight and per-job health checks.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_ensure_agent_env.py:Interface
    reason: Ensure recurring-tasks' systemd AI_AGENT_COMMAND_TEMPLATE is in place.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_job_utils.py:Interface
    reason: Expose legacy recurring job helper module through the dispatcher runtime
      contract.
  - command:
    - systemctl
    reason: Manage systemd user units.
  - command:
    - journalctl
    reason: Read systemd journal for job diagnostics.
interfaces:
  machine:
    scripts-enable:
      version: 1
      description: 'Enable a job by setting enabled: true in jobs.yaml and syncing
        native scheduler entries.'
      usage: <name>
      patterns:
      - name: owner
        allow_extra_positionals: true
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Reads and writes jobs.yaml.
        version: ">=6"
        platforms:
          linux: true
          macos: true
          windows: true
      - kind: system-service
        name: systemd-user
        reason: Provides the user timer manager that owns generated recurring-task units.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: system-service
        name: launchd
        reason: Provides the per-user scheduler that owns generated recurring-task entries.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: system-service
        name: task-scheduler
        reason: Provides the per-user scheduler that owns generated recurring-task entries.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: systemctl
        reason: Enables and starts generated user timers.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: binary
        name: launchctl
        reason: Enables and starts generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: binary
        name: schtasks
        reason: Enables and starts generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - enable
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-disable:
      version: 1
      description: 'Disable a job by setting enabled: false in jobs.yaml and syncing
        native scheduler entries.'
      usage: <name>
      patterns:
      - name: owner
        allow_extra_positionals: true
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Reads and writes jobs.yaml.
        version: ">=6"
        platforms:
          linux: true
          macos: true
          windows: true
      - kind: system-service
        name: systemd-user
        reason: Provides the user timer manager that owns generated recurring-task units.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: system-service
        name: launchd
        reason: Provides the per-user scheduler that owns generated recurring-task entries.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: system-service
        name: task-scheduler
        reason: Provides the per-user scheduler that owns generated recurring-task entries.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: systemctl
        reason: Disables generated user timers.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: binary
        name: launchctl
        reason: Disables generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: binary
        name: schtasks
        reason: Disables generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - disable
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-test:
      version: 1
      description: Trigger a job immediately through the native scheduler, show output and status.
      usage: <name>
      patterns:
      - name: owner
        allow_extra_positionals: true
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Reads jobs.yaml before running the job.
        version: ">=6"
        platforms:
          linux: true
          macos: true
          windows: true
      - kind: system-service
        name: systemd-user
        reason: Provides the user service manager used to trigger jobs.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: system-service
        name: launchd
        reason: Provides the per-user scheduler used to trigger jobs.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: system-service
        name: task-scheduler
        reason: Provides the per-user scheduler used to trigger jobs.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: systemctl
        reason: Starts the generated user service immediately.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: binary
        name: launchctl
        reason: Starts the generated scheduler entry immediately.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: binary
        name: schtasks
        reason: Starts the generated scheduler entry immediately.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - test
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-view-logs:
      version: 1
      description: Tail the run log for a job (default 50 lines).
      usage: <job-name> [--lines N]
      patterns:
      - name: owner
        allow_extra_positionals: true
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Loads jobs.yaml before locating the run log.
        version: ">=6"
        platforms:
          linux: true
          macos: true
          windows: true
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - view-logs
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-status:
      version: 1
      description: List active recurring scheduler entries, next fire times, and service status.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: false
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Loads jobs.yaml in the management CLI.
        version: ">=6"
        platforms:
          linux: true
          macos: true
          windows: true
      - kind: system-service
        name: systemd-user
        reason: Provides the user timer manager queried for recurring-task status.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: system-service
        name: launchd
        reason: Provides the per-user scheduler queried for recurring-task status.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: system-service
        name: task-scheduler
        reason: Provides the per-user scheduler queried for recurring-task status.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: systemctl
        reason: Lists active generated user timers.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: binary
        name: launchctl
        reason: Lists active generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: binary
        name: schtasks
        reason: Lists active generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_job_control.py:Interface
        args_prefix:
        - status
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-sync:
      version: 1
      description: Regenerate native scheduler entries from jobs.yaml.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: false
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Reads jobs.yaml while generating unit files.
        version: ">=6"
        platforms:
          linux: true
          macos: true
          windows: true
      - kind: system-service
        name: systemd-user
        reason: Provides the user timer manager that loads generated unit files.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: system-service
        name: launchd
        reason: Provides the per-user scheduler that loads generated entries.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: system-service
        name: task-scheduler
        reason: Provides the per-user scheduler that loads generated entries.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: systemctl
        reason: Reloads and enables generated user timers.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: binary
        name: launchctl
        reason: Loads generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: binary
        name: schtasks
        reason: Creates or updates generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_unit_writer.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-healthcheck:
      version: 1
      description: Run pre-flight and per-job health checks for all enabled recurring
        tasks; sends a desktop notification on failure.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: false
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Reads jobs.yaml for enabled jobs.
        version: ">=6"
        platforms:
          linux: true
          macos: true
          windows: true
      - kind: system-service
        name: systemd-user
        reason: Provides the user service and timer state checked by health probes.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: system-service
        name: launchd
        reason: Provides the per-user scheduler state checked by health probes.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: system-service
        name: task-scheduler
        reason: Provides the per-user scheduler state checked by health probes.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: systemctl
        reason: Checks user service and timer health.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: binary
        name: launchctl
        reason: Checks generated user scheduler health.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: binary
        name: schtasks
        reason: Checks generated user scheduler health.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: journalctl
        reason: Reports recent service logs for failing jobs.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_healthcheck_probe.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-setup:
      version: 1
      description: Verify prerequisites, sync native scheduler entries from jobs.yaml,
        install recurring health checks, and list active timers/tasks.
      usage: '[--migrate-cron]'
      patterns:
      - name: owner
        allow_extra_positionals: true
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Validates that jobs.yaml tooling can load YAML.
        version: ">=6"
        platforms:
          linux: true
          macos: true
          windows: true
      - kind: system-service
        name: systemd-user
        reason: Provides the user timer manager configured during setup.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: system-service
        name: launchd
        reason: Provides the per-user scheduler configured during setup.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: system-service
        name: task-scheduler
        reason: Provides the per-user scheduler configured during setup.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: systemctl
        reason: Lists and manages generated user timers.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: binary
        name: launchctl
        reason: Lists and manages generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: true
          windows: false
      - kind: binary
        name: schtasks
        reason: Lists and manages generated user scheduler entries.
        version: any
        platforms:
          linux: false
          macos: false
          windows: true
      - kind: binary
        name: crontab
        reason: Installs the recurring healthcheck cron entry.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_setup_runner.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: true
        windows: true
    scripts-ensure-agent-env:
      version: 1
      description: Idempotently ensure recurring-tasks' systemd AI_AGENT_COMMAND_TEMPLATE
        is in place. Also run automatically by scripts-setup.
      usage: --repo-root DIR --home DIR --bin-dir DIR [--dry-run]
      patterns:
      - name: owner
      dependencies:
      - kind: system-service
        name: systemd-user
        reason: Owns the user manager environment updated for recurring-task jobs.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      - kind: binary
        name: systemctl
        reason: Publishes recurring-task environment variables to the user manager
          when available.
        version: any
        platforms:
          linux: true
          macos: false
          windows: false
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_ensure_agent_env.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: false
        windows: false
    scripts-job-utils:
      version: 1
      patterns:
      - name: owner
        allow_extra_positionals: true
      dependencies: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_job_utils.py:Interface
        behavior_sources: []
      platform_support:
        linux: true
        macos: false
        windows: false
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
      uses_interfaces:
      - interface: install-assistant-tools.llm.default
        version: 2
      behavior_sources: []
