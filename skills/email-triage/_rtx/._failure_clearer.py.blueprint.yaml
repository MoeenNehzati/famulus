schema_version: 2
blueprint_type: machine-interface
id: email-triage.machine.scripts-clear-failure
version: 1
description: Clear a latched triage failure after its cause is fixed, without advancing the watermark.
usage: '[reason]'
patterns:
  - name: owner
    allow_extra_positionals: true
binding:
  kind: python-entrypoint
  path: _rtx/_failure_clearer.py
  symbol: Interface
dependencies: []
behavior_sources: []
direct_io:
  reads:
    - medium: local-filesystem
      access: read
      system: filesystem
      content: diagnostic-report
      format: json
      path: state/status.json
      sensitivity: derived-private
  writes:
    - medium: local-filesystem
      access: write
      system: filesystem
      content: diagnostic-report
      format: json
      path: state/status.json
      sensitivity: derived-private
  network: []
owns_filesystem: []
platform_support:
  linux: true
  macos: true
  windows: true
