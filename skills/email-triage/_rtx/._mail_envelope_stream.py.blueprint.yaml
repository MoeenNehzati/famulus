schema_version: 2
blueprint_type: machine-interface
id: email-triage.machine.fetch-filtered-envelopes
version: 1
description: Fetch email envelopes for one account through email-client and emit only envelopes strictly after the triage watermark.
usage: -a <account> --after YYYY-MM-DD
patterns:
  - name: owner
    allow_extra_positionals: true
binding:
  kind: python-entrypoint
  path: _rtx/_mail_envelope_stream.py
  symbol: Interface
dependencies: []
uses_interfaces:
  - interface: email-client.machine.mail-list
    version: 1
behavior_sources: []
direct_io:
  reads:
    - medium: local-filesystem
      access: read
      system: filesystem
      content: watermark
      format: text
      path: state/last_run
      sensitivity: user-private
    - medium: local-filesystem
      access: read
      system: filesystem
      content: diagnostic-report
      format: json
      path: state/status.json
      sensitivity: derived-private
  writes:
    - medium: stdout
      access: write
      content: email
      formats:
        - json
        - text
      sensitivity: user-private
    - medium: local-filesystem
      access: write
      system: filesystem
      content: diagnostic-report
      format: json
      path: state/status.json
      sensitivity: derived-private
  network: []
owns_filesystem: []
platform_support:
  linux: true
  macos: true
  windows: true
