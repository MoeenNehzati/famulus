schema_version: 2
blueprint_type: llm-interface
id: email-triage.llm.triage
version: 2
description: Scans emails received since the last triage run and routes extracted action items to the right list.
binding:
  kind: instruction-file
  path: llm_interfaces/triage.md
uses_interfaces:
  - interface: email-client.llm.default
    version: 3
  - interface: list-manager.llm.default
    version: 1
  - interface: email-triage.machine.fetch-filtered-envelopes
    version: 1
  - interface: email-triage.machine.scripts-get-cutoff
    version: 1
  - interface: email-triage.machine.scripts-log-decision
    version: 1
  - interface: email-triage.machine.scripts-prune-log
    version: 1
  - interface: email-triage.machine.scripts-update-watermark
    version: 1
  - interface: email-triage.machine.scripts-mark-failure
    version: 1
  - interface: email-triage.machine.scripts-clear-failure
    version: 1
behavior_sources: []
direct_io:
  reads: []
  writes:
    - medium: prompt
      access: write
      content: response
      format: markdown
      sensitivity: derived-private
  network: []
owns_filesystem: []
