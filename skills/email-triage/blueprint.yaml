# Canonical contract for email-triage.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder script interfaces as each script contract becomes clearer.

category: general-assistant
# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

cross_platform: false

depends_on:
  email-client:
    major_version: 1
  list-manager:
    major_version: 1

suggested_permissions:
  bash:
    - command: ["scripts/fetch-envelopes.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/get-cutoff.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/update-watermark.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["scripts/log-decision.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["python3", "scripts/prune-log.py"]
      reason: "Migrated from legacy permissions.json."
  network:
    []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

script_interfaces:
  scripts-fetch-envelopes:
    id: scripts-fetch-envelopes
    description: "Fetch email envelope metadata for a given account since the last watermark."
    usage: "-a <account>"
    cwd: skill_root
    command: ["python3", "scripts/fetch-envelopes.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true
  scripts-get-cutoff:
    id: scripts-get-cutoff
    description: "Return the cutoff date for the current triage run, with a fallback if no watermark exists."
    usage: ""
    cwd: skill_root
    command: ["python3", "scripts/get-cutoff.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true
  scripts-log-decision:
    id: scripts-log-decision
    description: "Append a triage classification decision for one email to triage.log."
    usage: "<account> <id> <from> <subject> <DECISION> <reason>"
    cwd: skill_root
    command: ["scripts/log-decision.sh"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true
  scripts-prune-log:
    id: scripts-prune-log
    description: "Drop triage.log entries older than 30 days and print a one-line summary."
    usage: ""
    cwd: skill_root
    command: ["python3", "scripts/prune-log.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true
  scripts-update-watermark:
    id: scripts-update-watermark
    description: "Advance the triage watermark to the current timestamp."
    usage: ""
    cwd: skill_root
    command: ["python3", "scripts/update-watermark.py"]
    default:
      patterns:
        - name: owner
          allow_extra_positionals: true
