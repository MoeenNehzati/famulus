# Canonical schema-version-2 skill graph root.
# Interface-local facts belong in the hidden sidecars referenced below.
schema_version: 2
blueprint_type: skill
id: email-triage
category: productivity-general-assistant
role: productivity
kind: triager

skill_interface:
  inputs:
    - User requests that match the SKILL.md description for this skill.
  outputs:
    - Responses, artifacts, or side effects described by this skill's workflow.
  side_effects:
    - May invoke local scripts or dependencies as described in SKILL.md.

suggested_permissions:
  bash:
    - command:
        - python3
        - -m
        - officina.runtime.python_machine_interface_runner
        - _rtx/_envelope_gate.py:Interface
      reason: Filters email-client mail-list JSON to strictly-after-watermark envelopes.
    - command:
        - python3
        - -m
        - officina.runtime.python_machine_interface_runner
        - _rtx/_mail_envelope_stream.py:Interface
      reason: Fetches mail-list envelopes through the declared boundary and emits only strictly-after-watermark results.
    - command:
        - python3
        - -m
        - officina.runtime.python_machine_interface_runner
        - _rtx/_watermark_floor.py:Interface
      reason: Suggested approval for the email triage runtime.
    - command:
        - python3
        - -m
        - officina.runtime.python_machine_interface_runner
        - _rtx/_watermark_writer.py:Interface
      reason: Suggested approval for the email triage runtime.
    - command:
        - python3
        - -m
        - officina.runtime.python_machine_interface_runner
        - _rtx/_decision_sink.py:Interface
      reason: Suggested approval for the email triage runtime.
    - command:
        - python3
        - -m
        - officina.runtime.python_machine_interface_runner
        - _rtx/_log_compactor.py:Interface
      reason: Suggested approval for the email triage runtime.
    - command:
        - python3
        - -m
        - officina.runtime.python_machine_interface_runner
        - _rtx/_failure_sentinel.py:Interface
      reason: Records a failed triage run so update-watermark refuses to advance and
        the scheduled health check can report it.
    - command:
        - python3
        - -m
        - officina.runtime.python_machine_interface_runner
        - _rtx/_failure_clearer.py:Interface
      reason: Clears a latched triage failure after its cause is fixed without advancing the watermark.
  network: []

interfaces:
  - interface: email-triage.llm.default
    version: 1
    blueprint: {base: skill-root, path: .SKILL.md.blueprint.yaml}
  - interface: email-triage.llm.triage
    version: 1
    blueprint: {base: skill-root, path: llm_interfaces/.triage.md.blueprint.yaml}
  - interface: email-triage.llm.update-personal-preferences
    version: 1
    blueprint: {base: skill-root, path: llm_interfaces/.update-personal-preferences.md.blueprint.yaml}
  - interface: email-triage.machine.scripts-filter-envelopes
    version: 1
    blueprint: {base: skill-root, path: _rtx/._envelope_gate.py.blueprint.yaml}
  - interface: email-triage.machine.fetch-filtered-envelopes
    version: 1
    blueprint: {base: skill-root, path: _rtx/._mail_envelope_stream.py.blueprint.yaml}
  - interface: email-triage.machine.scripts-get-cutoff
    version: 1
    blueprint: {base: skill-root, path: _rtx/._watermark_floor.py.blueprint.yaml}
  - interface: email-triage.machine.scripts-log-decision
    version: 1
    blueprint: {base: skill-root, path: _rtx/._decision_sink.py.blueprint.yaml}
  - interface: email-triage.machine.scripts-prune-log
    version: 1
    blueprint: {base: skill-root, path: _rtx/._log_compactor.py.blueprint.yaml}
  - interface: email-triage.machine.scripts-update-watermark
    version: 1
    blueprint: {base: skill-root, path: _rtx/._watermark_writer.py.blueprint.yaml}
  - interface: email-triage.machine.scripts-mark-failure
    version: 1
    blueprint: {base: skill-root, path: _rtx/._failure_sentinel.py.blueprint.yaml}
  - interface: email-triage.machine.scripts-clear-failure
    version: 1
    blueprint: {base: skill-root, path: _rtx/._failure_clearer.py.blueprint.yaml}
