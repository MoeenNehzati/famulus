# Canonical contract for email-triage.
# This file was migrated from legacy skill metadata.
# Tighten the placeholder machine interfaces as each runtime contract becomes clearer.

category: productivity-general-assistant
# Bump this major version whenever the exported contract changes in a
# breaking way for dependent skills.
interface_version: 1

cross_platform: false

depends_on:
  email-client:
    major_version: 3
  list-manager:
    major_version: 1

suggested_permissions:
  bash:
    - command: ["python3", "_rtx/_envelope_gate.py"]
      reason: "Filters email-client mail-list JSON to strictly-after-watermark envelopes."
    - command: ["_rtx/_watermark_floor.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["_rtx/_watermark_writer.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["_rtx/_decision_sink.sh"]
      reason: "Migrated from legacy permissions.json."
    - command: ["python3", "_rtx/_log_compactor.py"]
      reason: "Migrated from legacy permissions.json."
    - command: ["python3", "_rtx/_failure_sentinel.py"]
      reason: "Records a failed triage run so update-watermark refuses to advance and the scheduled health check can report it."
  network:
    []

skill_interface:
  inputs:
    - "User requests that match the SKILL.md description for this skill."
  outputs:
    - "Responses, artifacts, or side effects described by this skill's workflow."
  side_effects:
    - "May invoke local scripts or dependencies as described in SKILL.md."

interfaces:
  machine:
    scripts-filter-envelopes:
      description: Filter JSON envelopes (from email-client's mail-list, piped via stdin) to those strictly after the triage
        watermark.
      usage: -a <account>   < envelopes.json
      patterns:
      - name: owner
        allow_extra_positionals: true
        allow_stdin: true
      runtime:
        kind: command
        argv:
        - python3
        - _rtx/_envelope_gate.py
      dependencies: []
    scripts-get-cutoff:
      description: Return the cutoff date for the current triage run, with a fallback if no watermark exists.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: command
        argv:
        - python3
        - _rtx/_watermark_floor.py
      dependencies: []
    scripts-log-decision:
      description: Append a triage classification decision for one email to triage.log.
      usage: <account> <id> <from> <subject> <DECISION> <reason>
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: command
        argv:
        - _rtx/_decision_sink.sh
      dependencies: []
    scripts-prune-log:
      description: Drop triage.log entries older than 30 days and print a one-line summary.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: command
        argv:
        - python3
        - _rtx/_log_compactor.py
      dependencies: []
    scripts-update-watermark:
      description: Advance the triage watermark to the current timestamp. Refuses if scripts-mark-failure was called earlier
        in this run.
      usage: ''
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: command
        argv:
        - python3
        - _rtx/_watermark_writer.py
      dependencies: []
    scripts-mark-failure:
      description: Record that this triage run failed, so update-watermark refuses to advance and the scheduled health check
        reports it.
      usage: <reason>
      patterns:
      - name: owner
        allow_extra_positionals: true
      runtime:
        kind: command
        argv:
        - python3
        - _rtx/_failure_sentinel.py
      dependencies: []
