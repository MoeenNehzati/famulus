category: skill-making-development-assistant
role: meta-skill
kind: generator
suggested_permissions:
  bash: []
  network: []
skill_interface:
  inputs:
  - User requests that match the SKILL.md description for this skill.
  outputs:
  - Responses, artifacts, or side effects described by this skill's workflow.
  side_effects:
  - May invoke local scripts or dependencies as described in SKILL.md.
interfaces:
  machine:
    sync-blueprints:
      version: 1
      description: Validate skill blueprints and optionally refresh generated artifacts.
      usage: '[--check]'
      allow_all_skills: false
      allowed_callers:
      - skill-audit
      patterns:
      - name: sync
        min_positionals: 0
        max_positionals: 0
        allow_stdin: false
        forbidden_flags:
        - --check
        notes: Refresh generated files from blueprint.yaml.
      - name: check
        min_positionals: 0
        max_positionals: 0
        allow_stdin: false
        required_flags:
        - --check
        allowed_flags:
        - --check
        notes: Validate blueprints and fail if generated files are out of sync.
      dependencies:
      - kind: python-package
        name: PyYAML
        reason: Parses skill blueprint YAML files.
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      invocation:
        kind: python_machine_interface
        entrypoint: _rtx/_blueprint_syncer.py:Interface
        behavior_sources: []
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []
      allow_all_skills: true
      behavior_sources: []
