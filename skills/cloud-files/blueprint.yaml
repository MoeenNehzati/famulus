        notes: Write plan files to cloud storage. Restricted to plans/ directory.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_write_llm_file.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_write_llm_file.py
      directly_writes: []
      direct_io:
        reads:
        - medium: stdin
          access: read
          content: plan
          format: text
          sensitivity: user-private
        writes:
        - medium: remote-filesystem
          access: write
          system: google-drive
          content: plan
          format: text
          path: plans/<path>
          auth:
            kind: google-drive-oauth
            mode: uses-existing
