          content: plan
          format: text
          path: plans/<path>
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
        network:
        - medium: network-request
          access: delete
          system: google-drive
          content: plan
          format: text
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
      owns_filesystem: []
    setup-oauth:
      version: 1
      description: Run one-time OAuth2 setup for Google Drive access.
      usage: '[--from-json <client_json_path>] [--client-id <id> --client-secret <secret>]
        [--port <port>]'
      allow_all_skills: false
      patterns:
      - min_positionals: 0
        max_positionals: 0
        allow_stdin: false
        notes: OAuth setup for Google Drive access.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_oauth_bootstrap.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_oauth_bootstrap.py
      directly_writes: []
      direct_io:
        reads:
        - medium: local-filesystem
          access: read
          system: filesystem
          content: credential
          format: json
          path: $home/.config/cloud-files/client.json
          sensitivity: secret
        writes:
        - medium: local-filesystem
          access: write
          system: filesystem
          content: credential
          format: json
          path: $home/.config/cloud-files/credentials.json
          auth:
            kind: google-drive-oauth
            mode: creates
          sensitivity: secret
        network:
        - medium: network-request
          access: request
          system: oauth
          content: credential
          format: json
          auth:
            kind: google-drive-oauth
            mode: creates
          sensitivity: secret
      owns_filesystem: []
    ensure-oauth:
      version: 1
      description: "Check cloud-files OAuth status; print setup guidance or launch\
        \ browser authorization as needed. Relocated from install-assistant-tools\
        \ \u2014 invoke directly (caller-skill cloud-files) as part of connecting\
        \ remotes."
      usage: ensure-oauth --home <dir> [--dry-run]
      allow_all_skills: false
      patterns:
      - min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        positional_patterns:
          0: ^ensure-oauth$
        notes: Check OAuth status and guide setup for cloud-files.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_ensure_oauth.py:Interface
        args_prefix:
        - ensure-oauth
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_ensure_oauth.py
      directly_writes: []
      direct_io:
        reads:
        - medium: local-filesystem
          access: read
          system: filesystem
          content: config
          format: json
          path: $home/.config/cloud-files/config.json
          sensitivity: user-private
        - medium: local-filesystem
          access: read
          system: filesystem
          content: credential
          format: json
          path: $home/.config/cloud-files/credentials.json
          auth:
            kind: google-drive-oauth
            mode: checks
          sensitivity: secret
        writes:
        - medium: stdout
          access: write
          content: response
          format: text
          sensitivity: derived-private
        network:
        - medium: network-request
          access: request
          system: oauth
          content: credential
          format: json
          auth:
            kind: google-drive-oauth
            mode: checks
          sensitivity: secret
      owns_filesystem: []
    write-config:
      version: 1
      description: Write ~/.config/cloud-files/config.json with the given remote LLM
        root. Relocated from install-assistant-tools.
      usage: write-config --home <dir> [--remote-llm-root <path>] [--dry-run]
      allow_all_skills: false
      patterns:
      - min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        positional_patterns:
          0: ^write-config$
        notes: Write cloud-files config.json.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_ensure_oauth.py:Interface
        args_prefix:
        - write-config
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_ensure_oauth.py
      directly_writes: []
      direct_io:
        reads:
        - medium: prompt
          access: read
          content: config
          format: text
          sensitivity: user-private
        writes:
        - medium: local-filesystem
          access: write
          system: filesystem
          content: config
          format: json
          path: $home/.config/cloud-files/config.json
          sensitivity: user-private
        network: []
      owns_filesystem:
      - match: exact
        path: $home/.config/cloud-files/config.json
        allowed_readers:
        - cloud-files.machine.ensure-oauth
        reason: write-config is the declared writer for the cloud-files config.
  llm:
    default:
      version: 1
      description: Primary LLM-facing skill instructions.
      binding:
        kind: skill_file
        path: SKILL.md
      directly_reads:
      - SKILL.md
      directly_executes: []
      directly_writes: []
      direct_io:
        reads:
        - medium: prompt
          access: read
          content: document
          format: text
          sensitivity: user-private
        writes:
        - medium: prompt
          access: write
          content: response
          format: markdown
          sensitivity: derived-private
        network: []
      owns_filesystem: []
      allow_all_skills: true
