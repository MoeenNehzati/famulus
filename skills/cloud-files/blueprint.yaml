        allow_stdin: false
        positional_patterns:
          0: ^plans/.*
        notes: Read plan files from cloud storage. Restricted to plans/ directory.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_read_llm_file.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_read_llm_file.py
      directly_writes: []
      direct_io:
        reads:
        - medium: remote-filesystem
          access: read
          system: google-drive
          content: plan
          format: text
          path: plans/<path>
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
        writes:
        - medium: stdout
