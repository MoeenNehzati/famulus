category: system-assistant
role: integration
kind: storage
suggested_permissions:
  bash:
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_read_llm_file.py:Interface
    reason: Read files from cloud storage under LLM root.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_write_llm_file.py:Interface
    reason: Write files to cloud storage under LLM root.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_delete_llm_file.py:Interface
    reason: Delete files from cloud storage under LLM root.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_ls_llm.py:Interface
    reason: List/check files in cloud storage.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_oauth_bootstrap.py:Interface
    reason: OAuth setup for cloud access.
  - command:
    - python3
    - -m
    - officina.runtime.python_machine_interface_runner
    - _rtx/_ensure_oauth.py:Interface
    reason: Check OAuth status and write config.json (relocated from install-assistant-tools).
  network: []
skill_interface:
  inputs:
  - File paths and content for cloud operations.
  outputs:
  - File contents and operation results.
  side_effects:
  - Reads and writes files on cloud storage.
interfaces:
  machine:
    lists-read:
      version: 1
      description: Read a file from cloud storage under the lists/ directory.
      usage: lists/<path>
      allow_all_skills: false
      allowed_callers:
      - list-manager
      - daily-plan
      patterns:
      - min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        positional_patterns:
          0: ^lists/.*
        notes: Read list files from cloud storage. Restricted to lists/ directory.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_read_llm_file.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_read_llm_file.py
      directly_writes: []
      direct_io:
        reads:
        - medium: remote-filesystem
          access: read
          system: google-drive
          content: list
          format: text
          path: lists/<path>
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
        writes:
        - medium: stdout
          access: write
          content: list
          format: text
          sensitivity: user-private
        network:
        - medium: network-request
          access: download
          system: google-drive
          content: list
          format: text
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
      owns_filesystem: []
    lists-write:
      version: 1
      description: Write content (from stdin) to a file in cloud storage under the
        lists/ directory.
      usage: lists/<path>
      allow_all_skills: false
      allowed_callers:
      - list-manager
      - daily-plan
      patterns:
      - min_positionals: 1
        max_positionals: 1
        allow_stdin: true
        positional_patterns:
          0: ^lists/.*
        notes: Write list files to cloud storage. Restricted to lists/ directory.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_write_llm_file.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_write_llm_file.py
      directly_writes: []
      direct_io:
        reads:
        - medium: stdin
          access: read
          content: list
          format: text
          sensitivity: user-private
        writes:
        - medium: remote-filesystem
          access: write
          system: google-drive
          content: list
          format: text
          path: lists/<path>
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
        network:
        - medium: network-request
          access: upload
          system: google-drive
          content: list
          format: text
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
      owns_filesystem: []
    lists-delete:
      version: 1
      description: Delete a file from cloud storage under the lists/ directory.
      usage: lists/<path>
      allow_all_skills: false
      allowed_callers:
      - list-manager
      patterns:
      - min_positionals: 1
        max_positionals: 1
        allow_stdin: false
        positional_patterns:
          0: ^lists/.*
        notes: Delete list files from cloud storage. Restricted to lists/ directory.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/_delete_llm_file.py:Interface
      dependencies: []
      directly_reads: []
      directly_executes:
      - _rtx/_delete_llm_file.py
      directly_writes: []
      direct_io:
        reads: []
        writes:
        - medium: remote-filesystem
          access: delete
          system: google-drive
          content: list
          format: text
          path: lists/<path>
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
        network:
        - medium: network-request
          access: delete
          system: google-drive
          content: list
          format: text
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
      owns_filesystem: []
    plans-read:
