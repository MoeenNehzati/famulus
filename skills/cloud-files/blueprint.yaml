        network:
        - medium: network-request
          access: download
          system: google-drive
          content: plan
          format: text
          auth:
            kind: google-drive-oauth
            mode: uses-existing
          sensitivity: user-private
      owns_filesystem: []
    plans-write:
      version: 1
      description: Write content (from stdin) to a file in cloud storage under the
