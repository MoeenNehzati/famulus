# Canonical contract for cloud-files.
# Implements directory-based resource ownership: each skill owns specific paths
# and only that skill (via allowed_callers) can read/write those paths.

category: system-assistant
interface_version: 1

depends_on: {}

suggested_permissions:
  bash:
    - command: ["python3", "scripts/read_llm_file.py"]
      reason: "Read files from cloud storage under LLM root."
    - command: ["python3", "scripts/write_llm_file.py"]
      reason: "Write files to cloud storage under LLM root."
    - command: ["python3", "scripts/delete_llm_file.py"]
      reason: "Delete files from cloud storage under LLM root."
    - command: ["python3", "scripts/ls_llm.py"]
      reason: "List/check files in cloud storage."
    - command: ["python3", "scripts/setup_oauth.py"]
      reason: "OAuth setup for cloud access."
    - command: ["python3", "scripts/ensure_oauth.py"]
      reason: "Check OAuth status and write config.json (relocated from install-assistant-tools)."
  network: []

skill_interface:
  inputs:
    - File paths and content for cloud operations.
  outputs:
    - File contents and operation results.
  side_effects:
    - Reads and writes files on cloud storage.

script_interfaces:
  # ========================================================================
  # LIST-MANAGER INTERFACES: Restricted to lists/ directory
  # ========================================================================
  # Only list-manager can read/write under lists/ directory.
  # Path constraints enforce this at invocation time (compile-time validation
  # by hooks, runtime validation by dispatcher).
  #
  lists-read:
    id: lists-read
    description: "Read a file from cloud storage under the lists/ directory."
    usage: "lists/<path>"
    cwd: skill_root
    command: ["python3", "scripts/read_llm_file.py"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          positional_patterns:
            0: "^lists/.*"  # ONLY paths under lists/ directory
          notes: "Read list files from cloud storage. Restricted to lists/ directory."
      # Not publicly exported; only list-manager can use this interface.
      allow_all_skills: false
      allowed_callers:
        - list-manager
        - daily-plan

  lists-write:
    id: lists-write
    description: "Write content (from stdin) to a file in cloud storage under the lists/ directory."
    usage: "lists/<path>"
    cwd: skill_root
    command: ["python3", "scripts/write_llm_file.py"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: true
          positional_patterns:
            0: "^lists/.*"  # ONLY paths under lists/ directory
          notes: "Write list files to cloud storage. Restricted to lists/ directory."
      # Not publicly exported; only list-manager can use this interface.
      allow_all_skills: false
      allowed_callers:
        - list-manager
        - daily-plan

  lists-delete:
    id: lists-delete
    description: "Delete a file from cloud storage under the lists/ directory."
    usage: "lists/<path>"
    cwd: skill_root
    command: ["python3", "scripts/delete_llm_file.py"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          positional_patterns:
            0: "^lists/.*"  # ONLY paths under lists/ directory
          notes: "Delete list files from cloud storage. Restricted to lists/ directory."
      # Not publicly exported; only list-manager can use this interface.
      allow_all_skills: false
      allowed_callers:
        - list-manager

  # ========================================================================
  # DAILY-PLAN INTERFACES: Restricted to plans/ directory
  # ========================================================================
  # Only daily-plan can read/write under plans/ directory.
  # Path constraints enforce this at invocation time.
  #
  plans-read:
    id: plans-read
    description: "Read a file from cloud storage under the plans/ directory."
    usage: "plans/<path>"
    cwd: skill_root
    command: ["python3", "scripts/read_llm_file.py"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          positional_patterns:
            0: "^plans/.*"  # ONLY paths under plans/ directory
          notes: "Read plan files from cloud storage. Restricted to plans/ directory."
      # Not publicly exported; only daily-plan can use this interface.
      allow_all_skills: false
      allowed_callers:
        - daily-plan

  plans-write:
    id: plans-write
    description: "Write content (from stdin) to a file in cloud storage under the plans/ directory."
    usage: "plans/<path>"
    cwd: skill_root
    command: ["python3", "scripts/write_llm_file.py"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: true
          positional_patterns:
            0: "^plans/.*"  # ONLY paths under plans/ directory
          notes: "Write plan files to cloud storage. Restricted to plans/ directory."
      # Not publicly exported; only daily-plan can use this interface.
      allow_all_skills: false
      allowed_callers:
        - daily-plan

  plans-delete:
    id: plans-delete
    description: "Delete a file from cloud storage under the plans/ directory."
    usage: "plans/<path>"
    cwd: skill_root
    command: ["python3", "scripts/delete_llm_file.py"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          positional_patterns:
            0: "^plans/.*"  # ONLY paths under plans/ directory
          notes: "Delete plan files from cloud storage. Restricted to plans/ directory."
      # Not publicly exported; only daily-plan can use this interface.
      allow_all_skills: false
      allowed_callers:
        - daily-plan

  setup-oauth:
    id: setup-oauth
    description: "Run one-time OAuth2 setup for Google Drive access."
    usage: "[--from-json <client_json_path>] [--client-id <id> --client-secret <secret>] [--port <port>]"
    cwd: skill_root
    command: ["python3", "scripts/setup_oauth.py"]
    default:
      patterns:
        - min_positionals: 0
          max_positionals: 0
          allow_stdin: false
          notes: "OAuth setup for Google Drive access."
      # Not publicly exported; invoked internally by ensure-oauth (as a
      # subprocess, not a dispatcher call) and directly by the owning skill.
      allow_all_skills: false

  ensure-oauth:
    id: ensure-oauth
    description: "Check cloud-files OAuth status; print setup guidance or launch browser authorization as needed. Relocated from install-assistant-tools — invoke directly (caller-skill cloud-files) as part of connecting remotes."
    usage: "ensure-oauth --home <dir> [--dry-run]"
    cwd: skill_root
    command: ["python3", "scripts/ensure_oauth.py"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          positional_patterns:
            0: "^ensure-oauth$"
          notes: "Check OAuth status and guide setup for cloud-files."
      allow_all_skills: false

  write-config:
    id: write-config
    description: "Write ~/.config/cloud-files/config.json with the given remote LLM root. Relocated from install-assistant-tools."
    usage: "write-config --home <dir> [--remote-llm-root <path>] [--dry-run]"
    cwd: skill_root
    command: ["python3", "scripts/ensure_oauth.py"]
    default:
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          positional_patterns:
            0: "^write-config$"
          notes: "Write cloud-files config.json."
      allow_all_skills: false
