name: Python Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python3 -m pip install pytest pyyaml jsonschema keyring

      - name: Install Claude and Codex CLIs
        run: npm install -g @anthropic-ai/claude-code @openai/codex

      - name: Run repo validators
        run: python3 validators/runner.py

      - name: Run Python test suite
        run: python3 scripts/run-python-tests.py --suite full --verbose

      - name: Run native recurring scheduler smoke
        if: always() && (matrix.os == 'macos-latest' || matrix.os == 'windows-latest')
        env:
          FAMULUS_RUN_SCHEDULER_SMOKE: '1'
        run: python3 -m pytest -q skills/recurring-tasks/tests/test_scheduler_live_smoke.py
