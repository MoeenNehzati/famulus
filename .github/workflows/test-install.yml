name: Install Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Claude CLI (npm)
        run: npm install -g claude

      - name: Install Codex CLI (npm)
        run: npm install -g @openai/codex

      - name: Verify CLI installations
        run: |
          claude --version
          codex --version

      - name: Run Claude install test
        run: python3 tests/test_claude_install.py

      - name: Run Codex install test
        run: python3 tests/test_codex_install.py
