[pytest]
# Canonical full-suite run (from repo root):
#   python3 scripts/run-python-tests.py --suite full --verbose
# Single suite:
#   python3 scripts/run-python-tests.py --suite precommit
#   python3 -m pytest skills/<name>/tests
python_files = test_*.py validate_*.py
testpaths = tests hooks/tests skills
# initialize-tdd's python assets are a scaffold template for new projects,
# not this repo's tests.
norecursedirs = skills/initialize-tdd .git __pycache__
