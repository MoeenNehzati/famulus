# Blueprint template for a blueprint-migrated skill.
# Copy this file to skills/<skill-name>/blueprint.yaml and then edit the values.
#
# This file is intentionally comment-heavy. The sync tooling must treat comments
# as user-owned authoring guidance and must not rewrite this file in place.

# Required single string. Must be one of the typed enum values in
# references/blueprint/schema.json.
category: research-assistant

# Required single string. Primary user-facing domain the skill serves. Must be
# one of the skillRole enum values in references/blueprint/schema.json.
role: research-writing

# Required single string. Primary shape of help the skill provides. Must be one
# of the skillKind enum values in references/blueprint/schema.json.
kind: reviewer

# Optional boolean. Default: true.
# Set this to false only when the skill is intentionally platform-specific and
# should be exempt from the shared cross-platform validator.
cross_platform: true

# Structured permission suggestions for smoother execution.
# These are not grants; they are advisory blueprint metadata.
#
# Supported categories:
# - bash: list of commands that are safe and common to pre-approve
#   - command: required list of argv tokens
#   - args_prefix: optional fixed argv prefix
#   - reason: required short explanation
# - network: list of suggested web capabilities
#   - kind: required, one of web_search or web_fetch
#   - domains: required only for web_fetch
#   - reason: required short explanation
#
# These suggestions are internal compatibility metadata. They do not define the
# public interface contract.
suggested_permissions:
  bash:
    - command: ["dispatcher"]
      args_prefix: ["--caller-skill", "example-skill", "example-skill.machine.read-data"]
      reason: "Primary read path behind the exported machine interface."
  network:
    - kind: web_search
      reason: "Needed only when live verification is part of the workflow."

# High-level skill contract. Keep this user-facing and dependency-facing.
skill_interface:
  inputs:
    - User request that triggers this skill.
    - Local files or remote data the skill reads.
  outputs:
    - Primary user-visible artifact or response.
  side_effects:
    - Files or external state this skill may change.

# ==============================================================================
# INTERFACES: Public callable/documented surfaces
# ==============================================================================
#
# Blueprint interfaces come in two namespaces:
#
# - interfaces.machine.<name>
#   Dispatcher-callable machine interfaces. Canonical external name:
#   <skill-name>.machine.<name>
#
# - interfaces.llm.<name>
#   LLM-facing interfaces documented through a separate file and routed by
#   higher-level skill logic. Canonical external name:
#   <skill-name>.llm.<name>
#
# Local interface names are the mapping keys under machine/llm. They must be
# dash-separated and must not contain dots.

interfaces:
  machine:
    # ==========================================================================
    # EXAMPLE 1: Read-only machine interface
    # ==========================================================================
    read-data:
      # Required positive integer. Bump only when this interface's exported
      # contract changes in a breaking way. The skill version is the version of
      # interfaces.llm.default.
      version: 1

      # Human-facing summary injected into generated SKILL.md.
      description: "Read an input file and optionally apply extra filters."

      # Optional complete invocation argument template shown in generated docs.
      usage: "<file> [filters]"

      # Access control.
      allow_all_skills: true
      allowed_callers: []

      # Valid calling conventions. Omit patterns entirely only for intentionally
      # unrestricted owner-facing interfaces.
      patterns:
        - min_positionals: 1
          allow_extra_positionals: true
          allow_stdin: false
          positional_patterns:
            0: ".*"
          notes: "First positional is the input file; additional positionals are filters."

      # Internal dispatcher-only runtime binding. This must not leak into
      # user-facing generated docs.
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/read_data.py:ReadData
      dependencies:
        - kind: python
          name: PyYAML
          reason: "Parses YAML input files read by this interface."
      # Optional. Version-pinned canonical machine interfaces this machine
      # interface invokes or orchestrates. Their interface hashes are included
      # recursively in this interface's audit hash.
      uses_interfaces: []
      directly_reads:
        - "$repo/data/example.yaml"
      directly_executes:
        - _rtx/read_data.py
      directly_writes: []
      # Required. Immediate semantic IO for this interface only. Do not copy IO
      # from interfaces named in uses_interfaces; tooling computes transitive IO
      # by following uses_interfaces recursively.
      direct_io:
        reads:
          - medium: local-filesystem
            access: read
            system: filesystem
            content: source
            format: yaml
            path: "$repo/data/example.yaml"
            sensitivity: user-private
        writes:
          - medium: stdout
            access: write
            content: report
            format: text
            sensitivity: derived-private
        network: []
      owns_filesystem: []

    # ==========================================================================
    # EXAMPLE 2: Multiple calling conventions
    # ==========================================================================
    update-data:
      version: 1
      description: "Update a target resource from file or stdin input."
      usage: "<target> --file /tmp/patch.yaml"
      allow_all_skills: true
      allowed_callers: []
      patterns:
        - name: "file-mode"
          min_positionals: 1
          max_positionals: 1
          allow_stdin: false
          required_flags: ["--file"]
          allowed_flags: ["--file"]
          flag_patterns:
            --file: "^/tmp/.*"
          notes: "File mode: caller supplies target and patch file via --file."
        - name: "stdin-mode"
          min_positionals: 1
          max_positionals: 1
          allow_stdin: true
          forbidden_flags: ["--file"]
          notes: "Stdin mode: reads update data from stdin."
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/update_data.py:UpdateData
      dependencies:
        - kind: python
          name: jsonschema
          reason: "Validates update payloads before writing them."
      directly_reads:
        - "$repo/data/example.yaml"
      directly_executes:
        - _rtx/update_data.py
      directly_writes:
        - "$repo/data/example.yaml"
      direct_io:
        reads:
          - medium: local-filesystem
            access: read
            system: filesystem
            content: source
            format: yaml
            path: "$repo/data/example.yaml"
            sensitivity: user-private
          - medium: stdin
            access: read
            content: patch
            format: yaml
            sensitivity: user-private
        writes:
          - medium: local-filesystem
            access: write
            system: filesystem
            content: source
            format: yaml
            path: "$repo/data/example.yaml"
            sensitivity: user-private
        network: []
      owns_filesystem:
        - match: exact
          path: "$repo/data/example.yaml"
          allowed_readers:
            - example-skill.machine.read-data
          reason: "This interface is the sole writer for the example data file."

    # ==========================================================================
    # EXAMPLE 3: Python class-backed machine interface
    # ==========================================================================
    analyze-data:
      version: 1
      description: "Analyze an input file through a Python machine-interface class."
      usage: "<file>"
      allow_all_skills: true
      allowed_callers: []
      patterns:
        - min_positionals: 1
          max_positionals: 1
          allow_stdin: false
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/analyze_data.py:AnalyzeData
      dependencies: []
      directly_reads: []
      directly_executes:
        - _rtx/analyze_data.py
      directly_writes: []
      direct_io:
        reads:
          - medium: local-filesystem
            access: read
            system: filesystem
            content: source
            path: "<file>"
            sensitivity: user-private
        writes:
          - medium: stdout
            access: write
            content: report
            format: text
            sensitivity: derived-private
        network: []
      owns_filesystem: []

    # ==========================================================================
    # EXAMPLE 4: Internal-only machine interface
    # ==========================================================================
    internal-worker:
      version: 1
      allow_all_skills: false
      allowed_callers: []
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/internal_worker.py:InternalWorker
      dependencies: []
      directly_reads: []
      directly_executes:
        - _rtx/internal_worker.py
      directly_writes: []
      direct_io:
        reads: []
        writes: []
        network: []
      owns_filesystem: []

    # ==========================================================================
    # EXAMPLE 5: Restricted machine interface
    # ==========================================================================
    special-data:
      version: 1
      allow_all_skills: false
      allowed_callers:
        - skill-a
        - skill-b
      patterns:
        - min_positionals: 1
          positional_patterns:
            0: "^special/.*"
          notes: "Only paths under special/ are accepted."
      runtime:
        kind: python_machine_interface
        entrypoint: _rtx/special_data.py:SpecialData
      dependencies: []
      directly_reads:
        - special/
      directly_executes:
        - _rtx/special_data.py
      directly_writes: []
      direct_io:
        reads:
          - medium: local-filesystem
            access: read
            system: filesystem
            content: source
            path: "special/"
            sensitivity: user-private
        writes:
          - medium: stdout
            access: write
            content: report
            format: text
            sensitivity: derived-private
        network: []
      owns_filesystem: []

  llm:
    # ==========================================================================
    # EXAMPLE 6: Default LLM-facing skill interface
    # ==========================================================================
    default:
      version: 1
      description: "Primary LLM-facing skill instructions."
      binding:
        kind: skill_file
        path: SKILL.md
      # Optional. Version-pinned interfaces this LLM prompt surface may route
      # through. LLM interfaces may use their own skill's machine interfaces and
      # other skills' LLM interfaces. They must not directly use another skill's
      # machine interfaces.
      uses_interfaces:
        - interface: example-skill.machine.read-data
          version: 1
        - interface: other-skill.llm.default
          version: 1
      directly_reads:
        - SKILL.md
      directly_executes: []
      directly_writes: []
      direct_io:
        reads:
          - medium: prompt
            access: read
            content: document
            format: text
            sensitivity: user-private
        writes:
          - medium: prompt
            access: write
            content: response
            format: markdown
            sensitivity: derived-private
        network: []
      owns_filesystem: []

    # ==========================================================================
    # EXAMPLE 7: LLM-facing interface
    # ==========================================================================
    summarize:
      version: 1
      description: "Summarize the collected records for a handoff note."
      binding:
        kind: markdown_file
        path: interfaces/summarize.md
      directly_reads:
        - interfaces/summarize.md
      directly_executes: []
      directly_writes: []
      direct_io:
        reads:
          - medium: prompt
            access: read
            content: report
            format: text
            sensitivity: user-private
        writes:
          - medium: prompt
            access: write
            content: response
            format: markdown
            sensitivity: derived-private
        network: []
      owns_filesystem: []
      allow_all_skills: true
      allowed_callers: []
      routing_hints:
        - "Use after machine interfaces have already collected the structured data."
        - "This interface is documented for the skill owner; dispatcher never executes it."

    # ==========================================================================
    # EXAMPLE 8: External LLM-facing interface
    # ==========================================================================
    summarize-remote:
      version: 1
      description: "Summarize records using a prompt surface published outside this repo."
      binding:
        kind: uri
        uri: https://example.com/officina/interfaces/summarize-remote.md
      directly_reads: []
      directly_executes: []
      directly_writes: []
      direct_io:
        reads:
          - medium: prompt
            access: read
            content: report
            format: text
            sensitivity: user-private
        writes:
          - medium: prompt
            access: write
            content: response
            format: markdown
            sensitivity: derived-private
        network: []
      owns_filesystem: []
      allow_all_skills: false
      allowed_callers:
        - prepare-handoff

# ==============================================================================
# MACHINE INTERFACE RUNTIME KIND
# ==============================================================================
#
# Current standard runtime kind:
#
# python_machine_interface
#    - entrypoint: required `_rtx/file.py:ClassName` binding
#    - args_prefix: optional argv tokens inserted before caller-supplied args
#    - dispatcher runs officina.runtime.python_machine_interface_runner
#    - route-smoke is mandatory and built into the shared runner
#
# Example Python machine-interface runtime:
#
# runtime:
#   kind: python_machine_interface
#   entrypoint: _rtx/analyze_data.py:AnalyzeData
#
# Machine interfaces must use python_machine_interface. External tools may be
# called from Python runtime code when they are declared as dependencies, but
# raw command runtimes are not allowed.
#
# Every executable interface must also declare runtime dependencies. Use []
# when it has no non-stdlib Python packages or external executables. These are
# factual runtime requirements, not permission suggestions.
#
# dependencies:
#   - kind: python
#     name: PyYAML
#     reason: "Reads YAML input files."
#   - kind: binary
#     name: curl
#     reason: "Fetches data from the remote API."
#
# Every interface must also declare direct effect roots. Use [] when there are no
# direct roots. Paths are relative to the directory containing blueprint.yaml;
# use $repo/ for paths relative to the repository root. Recursive hashing is
# handled by tooling, so a directory root covers all files below it.
#
# directly_reads:
#   - SKILL.md
# directly_executes:
#   - _rtx/read_data.py
# directly_writes: []
#
# direct_io describes immediate semantic IO for generated docs, search, graphs,
# and safety summaries. It is required on every machine and LLM interface. Use
# empty lists only after verifying that the interface has no direct IO of that
# kind. Do not duplicate IO from interfaces listed in uses_interfaces.
#
# direct_io:
#   reads: []
#   writes: []
#   network: []
#
# owns_filesystem declares exclusive ownership of local-filesystem paths. Use
# [] when the interface owns no filesystem paths. If an interface owns a path,
# only that interface may write matching direct_io local-filesystem entries, and
# only that interface plus allowed_readers may read them.
#
# owns_filesystem: []
#
# ==============================================================================
# LLM INTERFACE BINDING KINDS
# ==============================================================================
#
# Current standard binding kinds:
#
# 1. skill_file
#    - path: required literal SKILL.md
#    - required for interfaces.llm.default; represents the skill file next to blueprint.yaml
#
# 2. markdown_file
#    - path: required path relative to the directory containing blueprint.yaml
#    - use when the prompt/interface definition lives inside this repo
#
# 3. uri
#    - uri: required absolute URI
#    - use when the prompt/interface definition is owned elsewhere

# ==============================================================================
# DISPATCH BEHAVIOR SUMMARY
# ==============================================================================
#
# When a caller invokes a machine interface via the dispatcher:
#
# 1. Parse the canonical target <skill>.machine.<name>.
# 2. Verify allow_all_skills / allowed_callers.
# 3. Match the invocation against declared patterns.
# 4. Resolve the inline runtime binding.
# 5. Execute without depending on the caller's working directory.
#
# If any check fails, the dispatcher rejects the invocation with an error.

# ==============================================================================
# REGEX PATTERN SYNTAX
# ==============================================================================
#
# Patterns use Python regex (re module). Common examples:
#
#   ".*"                    Match any string (no constraint)
#   "^abc$"                 Exact match: "abc" only
#   "^/tmp/.*"              Absolute path starting with /tmp/
#   "json|yaml"             Alternation: either "json" or "yaml"
#   "^[a-z0-9_-]+$"         Alphanumeric/dash/underscore only
#   "^[0-9]{1,3}$"          1-3 digits
#
# IMPORTANT: Use ^ and $ to anchor patterns to the full string.

# ==============================================================================
# BEST PRACTICES
# ==============================================================================
#
# 1. Prefer one canonical machine interface per callable behavior. Do not hide
#    several public interface ids behind a grouped command surface.
#
# 2. Keep public interface documentation (`description`, `usage`, `notes`)
#    separate from private runtime metadata (`runtime`).
#
# 3. Use relative imports for same-skill Python code inside _rtx/.
#
# 4. Put truly shared first-party Python code under src/officina/, not in
#    another skill's runtime directory.
#
# 5. Use `python_machine_interface` for machine interfaces. Its shared runner
#    preserves same-skill _rtx relative imports and provides the standard
#    route-smoke path. Raw `command` runtimes are not allowed.
